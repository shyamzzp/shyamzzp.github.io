<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      var pathSegmentsToKeep =
        window.location.pathname.indexOf("/beta-test/") === 0 ? 1 : 0;
      var locationData = window.location;

      locationData.replace(
        locationData.protocol +
          "//" +
          locationData.hostname +
          (locationData.port ? ":" + locationData.port : "") +
          locationData.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          locationData.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (locationData.search
            ? "&" + locationData.search.slice(1).replace(/&/g, "~and~")
            : "") +
          locationData.hash
      );
    </script>
  </head>
  <body></body>
</html>
