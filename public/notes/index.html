<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<style>
  :root {
    --bg: #0a0e0a;
    --cell-bg: #050705;
    --border: #2a3a2a;
    --text: #6fe06f;
    --title-text: #9cf09c;
    --title-bg: #0f140f;
    --placeholder: #4a6f4a;
    --toolbar-bg: #0f140f;
    --toolbar-border: #2c3c2c;
    --btn-bg: #162016;
    --btn-hover: #21321f;
    --btn-text: #7ad67a;
    --search-bg: #0f140f;
    --search-border: #3a6a3a;
    --highlight: rgba(80,255,80,0.28);
    --highlight-active: rgba(80,255,80,0.55);
    --count-text: #5a9a5a;
    --font-size: 13px;
  }
  html[data-theme="light"] {
    --bg: #f0f4f0;
    --cell-bg: #fff;
    --border: #d0dcd0;
    --text: #1a5c1a;
    --title-text: #0f4a0f;
    --title-bg: #e8f0e8;
    --placeholder: #aacaaa;
    --toolbar-bg: #e4ece4;
    --toolbar-border: #c4d4c4;
    --btn-bg: #dce8dc;
    --btn-hover: #c8dcc8;
    --btn-text: #1a5c1a;
    --search-bg: #fff;
    --search-border: #88bb88;
    --highlight: rgba(0,160,0,0.18);
    --highlight-active: rgba(0,160,0,0.38);
    --count-text: #5a9a5a;
  }
  /* Midnight — deep blue dark */
  html[data-theme="midnight"] {
    --bg: #060a14;
    --cell-bg: #04060d;
    --border: #14203a;
    --text: #6fa8dc;
    --title-text: #8fc1ee;
    --title-bg: #0a1020;
    --placeholder: #2a3a55;
    --toolbar-bg: #0a1020;
    --toolbar-border: #1c2c48;
    --btn-bg: #101a2e;
    --btn-hover: #1a2a48;
    --btn-text: #6fa8dc;
    --search-bg: #0a1020;
    --search-border: #2a4a7a;
    --highlight: rgba(80,160,255,0.25);
    --highlight-active: rgba(80,160,255,0.5);
    --count-text: #3a5a8a;
  }
  /* Dracula — purple/pink dark */
  html[data-theme="dracula"] {
    --bg: #1a1626;
    --cell-bg: #14101f;
    --border: #322a44;
    --text: #c9a8e9;
    --title-text: #ff79c6;
    --title-bg: #221b33;
    --placeholder: #4a3a5e;
    --toolbar-bg: #221b33;
    --toolbar-border: #3a3050;
    --btn-bg: #2a2240;
    --btn-hover: #3a2e54;
    --btn-text: #c9a8e9;
    --search-bg: #221b33;
    --search-border: #6a4a8a;
    --highlight: rgba(255,121,198,0.22);
    --highlight-active: rgba(255,121,198,0.45);
    --count-text: #6a5a8a;
  }
  /* Carbon — neutral monochrome dark */
  html[data-theme="carbon"] {
    --bg: #121212;
    --cell-bg: #0c0c0c;
    --border: #2e2e2e;
    --text: #d0d0d0;
    --title-text: #f0f0f0;
    --title-bg: #1a1a1a;
    --placeholder: #5a5a5a;
    --toolbar-bg: #1a1a1a;
    --toolbar-border: #2e2e2e;
    --btn-bg: #222;
    --btn-hover: #2e2e2e;
    --btn-text: #d0d0d0;
    --search-bg: #1a1a1a;
    --search-border: #4a4a4a;
    --highlight: rgba(255,255,255,0.18);
    --highlight-active: rgba(255,255,255,0.38);
    --count-text: #8a8a8a;
  }
  /* Nord — arctic blue-grey dark */
  html[data-theme="nord"] {
    --bg: #2e3440;
    --cell-bg: #272c36;
    --border: #3b4252;
    --text: #d8dee9;
    --title-text: #88c0d0;
    --title-bg: #323845;
    --placeholder: #616e88;
    --toolbar-bg: #323845;
    --toolbar-border: #3b4252;
    --btn-bg: #3b4252;
    --btn-hover: #434c5e;
    --btn-text: #d8dee9;
    --search-bg: #2e3440;
    --search-border: #5e81ac;
    --highlight: rgba(136,192,208,0.25);
    --highlight-active: rgba(136,192,208,0.5);
    --count-text: #7b88a1;
  }
  /* Matrix — intense green terminal */
  html[data-theme="matrix"] {
    --bg: #000700;
    --cell-bg: #000300;
    --border: #0f4f0f;
    --text: #00ff66;
    --title-text: #66ff99;
    --title-bg: #021202;
    --placeholder: #1f6f3f;
    --toolbar-bg: #021202;
    --toolbar-border: #0f4f0f;
    --btn-bg: #041a04;
    --btn-hover: #0a2e0a;
    --btn-text: #00ff66;
    --search-bg: #021202;
    --search-border: #1f8f4f;
    --highlight: rgba(0,255,102,0.3);
    --highlight-active: rgba(0,255,102,0.6);
    --count-text: #2f9f5f;
  }
  /* Crimson — dark red ember */
  html[data-theme="crimson"] {
    --bg: #160a0c;
    --cell-bg: #100608;
    --border: #3a1a20;
    --text: #e8a0aa;
    --title-text: #ff8090;
    --title-bg: #1e0e12;
    --placeholder: #6a3a42;
    --toolbar-bg: #1e0e12;
    --toolbar-border: #3a1a20;
    --btn-bg: #281418;
    --btn-hover: #381e24;
    --btn-text: #e8a0aa;
    --search-bg: #1e0e12;
    --search-border: #7a3a44;
    --highlight: rgba(255,100,120,0.22);
    --highlight-active: rgba(255,100,120,0.45);
    --count-text: #9a5a62;
  }
  /* Ocean — deep teal dark */
  html[data-theme="ocean"] {
    --bg: #021418;
    --cell-bg: #010d10;
    --border: #0a3640;
    --text: #7fdbd0;
    --title-text: #5fe0d8;
    --title-bg: #04181d;
    --placeholder: #2f5f64;
    --toolbar-bg: #04181d;
    --toolbar-border: #0a3640;
    --btn-bg: #062228;
    --btn-hover: #0a3038;
    --btn-text: #7fdbd0;
    --search-bg: #04181d;
    --search-border: #1f6a70;
    --highlight: rgba(95,224,216,0.24);
    --highlight-active: rgba(95,224,216,0.48);
    --count-text: #4f8f90;
  }
  /* Amber — warm sepia light */
  html[data-theme="amber"] {
    --bg: #f3ecdd;
    --cell-bg: #fdf8ee;
    --border: #ddd0b8;
    --text: #6b4f1d;
    --title-text: #523b13;
    --title-bg: #ece1cc;
    --placeholder: #c2b18d;
    --toolbar-bg: #e8dcc4;
    --toolbar-border: #cebf9f;
    --btn-bg: #e0d3b8;
    --btn-hover: #d4c4a4;
    --btn-text: #6b4f1d;
    --search-bg: #fdf8ee;
    --search-border: #b89a5e;
    --highlight: rgba(180,120,0,0.2);
    --highlight-active: rgba(180,120,0,0.4);
    --count-text: #9a8458;
  }
  /* Slate — cool grey light */
  html[data-theme="slate"] {
    --bg: #e9edf1;
    --cell-bg: #fbfcfd;
    --border: #cbd3dc;
    --text: #2d3e50;
    --title-text: #1b2a3a;
    --title-bg: #dde3ea;
    --placeholder: #a8b4c0;
    --toolbar-bg: #d8dee6;
    --toolbar-border: #bcc6d2;
    --btn-bg: #d0d8e0;
    --btn-hover: #c0cad6;
    --btn-text: #2d3e50;
    --search-bg: #fbfcfd;
    --search-border: #8a9aac;
    --highlight: rgba(40,90,150,0.18);
    --highlight-active: rgba(40,90,150,0.38);
    --count-text: #6a7888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  /* ── Toolbar ── */
  #toolbar {
    --tb-h: 26px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .tb-group {
    display: flex;
    align-items: center;
    gap: 3px;
    height: var(--tb-h);
  }

  /* Uniform height for all interactive toolbar controls */
  #toolbar button,
  #toolbar input,
  #toolbar #font-size-display {
    height: var(--tb-h);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .tb-sep {
    width: 1px;
    height: 18px;
    background: var(--toolbar-border);
    margin: 0 3px;
  }

  button {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--toolbar-border);
    padding: 3px 8px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 2px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  button:hover { background: var(--btn-hover); }
  button.active { background: var(--btn-hover); border-color: var(--text); }

  #font-size-display {
    color: var(--count-text);
    font-size: 11px;
    font-family: 'Courier New', monospace;
    min-width: 28px;
    text-align: center;
  }
  #font-size-label, .tb-meta-label {
    color: var(--count-text);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    opacity: 0.55;
    margin-left: 2px;
  }
  button:disabled { opacity: 0.3; cursor: default; }

  #search-input {
    background: var(--search-bg);
    color: var(--text);
    border: 1px solid var(--search-border);
    padding: 3px 8px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 2px;
    width: 190px;
    outline: none;
  }
  #search-input::placeholder { color: var(--placeholder); }
  #search-input:focus { border-color: var(--text); }

  #search-count {
    color: var(--count-text);
    font-size: 11px;
    min-width: 50px;
  }

  #status {
    margin-left: auto;
    color: var(--count-text);
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #status.show { opacity: 1; }

  /* ── Grid ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    flex: 1;
    gap: 0;
    overflow: hidden;
  }
  /* Fixed uniform card height for all cards (scrollable) */
  #grid.fixed-height {
    grid-template-rows: none;
    grid-auto-rows: var(--card-h, 200px);
    overflow-y: auto;
  }

  .section {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--title-bg);
    border-bottom: 1px solid var(--border);
    padding: 2px 6px;
    flex-shrink: 0;
  }

  .section-title {
    color: var(--title-text);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    cursor: text;
  }
  .section-title::placeholder { color: var(--placeholder); }

  .word-count {
    color: var(--count-text);
    font-size: 9px;
    white-space: nowrap;
    margin-left: 6px;
    flex-shrink: 0;
  }

  .textarea {
    flex: 1;
    background: var(--cell-bg);
    color: var(--text);
    border: none;
    outline: none;
    padding: 8px 10px;
    font-family: 'Courier New', monospace;
    font-size: var(--font-size);
    line-height: 1.55;
    resize: none;
    width: 100%;
  }
  .textarea::placeholder { color: var(--placeholder); }
  .textarea:focus { background: color-mix(in srgb, var(--cell-bg) 85%, var(--text) 15%); }

  /* ── Cell body & split panes ── */
  .cell-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
  }
  .cell-body.split > .textarea { flex: 0 0 50%; }

  .cell-splitter {
    flex: 0 0 5px;
    background: var(--border);
    position: relative;
    z-index: 2;
  }
  .cell-splitter:hover { background: var(--text); }
  .cell-body[style*="row"] > .cell-splitter,
  .cell-body:not([style*="column"]) > .cell-splitter { cursor: col-resize; }
  .cell-body[style*="column"] > .cell-splitter { cursor: row-resize; }

  /* Split control button in header */
  .split-btn {
    background: transparent;
    border: none;
    color: var(--count-text);
    font-size: 11px;
    line-height: 1;
    padding: 0 3px;
    height: auto;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 2px;
  }
  .split-btn:hover { color: var(--text); background: transparent; }

  /* Split picker popup */
  .split-popup {
    position: absolute;
    z-index: 100;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-radius: 4px;
    padding: 4px;
    display: flex;
    gap: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .split-popup.hidden { display: none; }
  .split-popup button {
    font-size: 14px;
    padding: 4px 8px;
    line-height: 1;
  }

  /* Search highlight */
  mark.sh { background: var(--highlight); color: inherit; border-radius: 1px; }
  mark.sh.active { background: var(--highlight-active); }

  /* ── Color coding ── */
  /* Color dot button in header */
  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 4px;
    transition: transform 0.1s;
  }
  .color-dot:hover { transform: scale(1.3); }

  /* Color picker popup */
  .color-picker-popup {
    position: absolute;
    z-index: 100;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-radius: 4px;
    padding: 5px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    width: 112px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .color-picker-popup.hidden { display: none; }

  .cp-swatch {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, transform 0.1s;
  }
  .cp-swatch:hover { transform: scale(1.15); }
  .cp-swatch.selected { border-color: #fff; }

  /* ── Color filter bar ── */
  .filter-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, transform 0.1s, opacity 0.1s;
    opacity: 0.55;
    position: relative;
  }
  .filter-swatch:hover { transform: scale(1.15); opacity: 0.85; }
  .filter-swatch.active { border-color: #fff; opacity: 1; }
  .filter-swatch[data-filter-id="none"] {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--btn-text);
  }
  #filter-label {
    color: var(--count-text);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    opacity: 0.55;
    margin-right: 2px;
  }

  /* Sections hidden by an active color filter */
  .section.filtered-out { display: none; }

  /* Section tinting — applied via inline CSS vars on .section */
  .section[data-color] .section-header {
    background: var(--sec-hdr-bg);
    border-bottom-color: var(--sec-border);
  }
  .section[data-color] {
    border-right-color: var(--sec-border);
    border-bottom-color: var(--sec-border);
  }
  .section[data-color] .textarea {
    background: var(--sec-ta-bg);
  }
  .section[data-color] .textarea:focus {
    background: var(--sec-ta-focus);
  }
  .section[data-color] .section-title {
    color: var(--sec-title);
  }
  .section[data-color] .color-dot {
    background: var(--sec-dot) !important;
  }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Theme -->
  <div class="tb-group">
    <button id="theme-btn" title="Toggle theme">◑ Theme</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Font size -->
  <div class="tb-group">
    <button id="font-down" title="Decrease font size (active section)">A−</button>
    <span id="font-size-display">—</span>
    <button id="font-up" title="Increase font size (active section)">A+</button>
    <span id="font-size-label">active section</span>
  </div>
  <div class="tb-sep"></div>

  <!-- Card height (all cards at once) -->
  <div class="tb-group">
    <button id="card-h-down" title="Shorter cards">H−</button>
    <span id="card-h-display">Auto</span>
    <button id="card-h-up" title="Taller cards">H+</button>
    <button id="card-h-auto" title="Fit all cards to screen">Fit</button>
    <span class="tb-meta-label">all cards</span>
  </div>
  <div class="tb-sep"></div>

  <!-- Search -->
  <div class="tb-group">
    <input id="search-input" type="text" placeholder="Search… ( / or Ctrl+F )" title="Focus search: / or Ctrl+F" autocomplete="off" spellcheck="false">
    <button id="search-prev" title="Previous match">↑</button>
    <button id="search-next" title="Next match">↓</button>
    <span id="search-count"></span>
    <button id="search-clear" title="Clear search">✕</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Color filter -->
  <div class="tb-group">
    <span id="filter-label">Filter:</span>
    <div id="filter-swatches" class="tb-group"></div>
  </div>
  <div class="tb-sep"></div>

  <!-- Save -->
  <div class="tb-group">
    <button id="save-btn" title="Save as HTML (Ctrl+S)">⬇ Save</button>
    <button id="clear-btn" title="Clear all sections">⌫ Clear All</button>
  </div>

  <span id="status">Saved ✓</span>
</div>

<!-- Shared floating color picker -->
<div id="color-popup" class="color-picker-popup hidden"></div>

<!-- Shared floating split picker -->
<div id="split-popup" class="split-popup hidden">
  <button data-split="row" title="Split side by side">⬌</button>
  <button data-split="col" title="Split stacked (top / bottom)">⬍</button>
  <button data-split="none" title="Merge into one">✕</button>
</div>

<div id="grid"></div>

<script>
(function () {
  const SECTIONS = 16;
  const STORAGE_KEY = 'notes_v3';
  let searchMatches = [];
  let searchIndex = -1;
  let theme = 'dark';
  const sectionColors = new Array(SECTIONS).fill(null); // null = default
  const sectionFontSizes = new Array(SECTIONS).fill(13); // per-section font size
  const splitModes = new Array(SECTIONS).fill(null); // null | 'row' (side by side) | 'col' (stacked)
  const splitPos = new Array(SECTIONS).fill(50);      // first pane size, percent
  let activeSectionIdx = -1; // index of currently focused textarea

  // ── Color palette ──
  // Each entry: { id, label, dark:{hdr,ta,taFocus,border,title,dot}, light:{...} }
  const PALETTE = [
    { id: 'none',    label: '✕', dot: '#444' },
    { id: 'red',     label: '', dot: '#c0392b',
      dark:  { hdr:'#1a0800', ta:'#110500', taFocus:'#1c0a00', border:'#4a1a0a', title:'#d06050', dot:'#c0392b' },
      light: { hdr:'#fdecea', ta:'#fff8f7', taFocus:'#fde8e5', border:'#e8a090', title:'#a03020', dot:'#c0392b' } },
    { id: 'orange',  label: '', dot: '#d35400',
      dark:  { hdr:'#1a0e00', ta:'#110900', taFocus:'#1c1000', border:'#4a2a00', title:'#c87830', dot:'#d35400' },
      light: { hdr:'#fef3e2', ta:'#fffaf3', taFocus:'#fdefd6', border:'#e8b870', title:'#904010', dot:'#d35400' } },
    { id: 'yellow',  label: '', dot: '#b8860b',
      dark:  { hdr:'#141200', ta:'#0e0c00', taFocus:'#181500', border:'#3a3000', title:'#b8a030', dot:'#b8860b' },
      light: { hdr:'#fdfbe6', ta:'#fffef5', taFocus:'#faf7d0', border:'#d4c050', title:'#706000', dot:'#b8860b' } },
    { id: 'green',   label: '', dot: '#1e8449',
      dark:  { hdr:'#001a08', ta:'#000f04', taFocus:'#001a0a', border:'#0a3a18', title:'#3a9a50', dot:'#1e8449' },
      light: { hdr:'#e8f8ee', ta:'#f5fdf8', taFocus:'#d8f0e2', border:'#80c898', title:'#0f6030', dot:'#1e8449' } },
    { id: 'teal',    label: '', dot: '#148f77',
      dark:  { hdr:'#001814', ta:'#000e0b', taFocus:'#001c17', border:'#0a3830', title:'#30988a', dot:'#148f77' },
      light: { hdr:'#e4f7f4', ta:'#f2fcfa', taFocus:'#d0f0ea', border:'#70c4b8', title:'#0a6058', dot:'#148f77' } },
    { id: 'blue',    label: '', dot: '#1a5276',
      dark:  { hdr:'#000e1a', ta:'#00080f', taFocus:'#001020', border:'#0a2a48', title:'#3878b0', dot:'#1a5276' },
      light: { hdr:'#e8f0fb', ta:'#f4f8fe', taFocus:'#d8e8f8', border:'#80a8d8', title:'#0f3a70', dot:'#1a5276' } },
    { id: 'purple',  label: '', dot: '#6c3483',
      dark:  { hdr:'#130a1a', ta:'#0c0510', taFocus:'#180e20', border:'#3a1a50', title:'#9060b8', dot:'#6c3483' },
      light: { hdr:'#f4eafb', ta:'#faf5fe', taFocus:'#ead8f8', border:'#b888d8', title:'#5a1a80', dot:'#6c3483' } },
    { id: 'pink',    label: '', dot: '#a93226',
      dark:  { hdr:'#1a0010', ta:'#0f0008', taFocus:'#1e0014', border:'#4a0830', title:'#c04880', dot:'#b03060' },
      light: { hdr:'#fdeef6', ta:'#fef7fb', taFocus:'#fcdeed', border:'#e898c0', title:'#8a1050', dot:'#b03060' } },
  ];

  // ── Build color popup ──
  const popup = document.getElementById('color-popup');
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'cp-swatch';
    sw.title = c.id === 'none' ? 'Remove color' : c.id;
    sw.style.background = c.dot;
    if (c.id === 'none') sw.textContent = '✕';
    sw.dataset.colorId = c.id;
    popup.appendChild(sw);
  });

  // ── Build color filter bar ──
  // Active filters: set of color ids ('none' = uncolored). Empty = show all.
  const activeFilters = new Set();
  const filterBar = document.getElementById('filter-swatches');
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'filter-swatch';
    sw.title = c.id === 'none' ? 'Show uncolored' : 'Show ' + c.id;
    sw.dataset.filterId = c.id;
    if (c.id === 'none') {
      sw.textContent = '○';
    } else {
      sw.style.background = c.dot;
    }
    filterBar.appendChild(sw);
  });

  filterBar.addEventListener('click', e => {
    const sw = e.target.closest('.filter-swatch');
    if (!sw) return;
    const id = sw.dataset.filterId;
    if (activeFilters.has(id)) activeFilters.delete(id);
    else activeFilters.add(id);
    sw.classList.toggle('active', activeFilters.has(id));
    applyFilters();
  });

  function applyFilters() {
    sections.forEach((sec, i) => {
      if (activeFilters.size === 0) {
        sec.classList.remove('filtered-out');
        return;
      }
      const colorId = sectionColors[i] || 'none';
      sec.classList.toggle('filtered-out', !activeFilters.has(colorId));
    });
  }

  let popupTarget = -1; // section index popup is open for

  function openPopup(secIdx, dotEl) {
    popupTarget = secIdx;
    // Position near the dot
    const rect = dotEl.getBoundingClientRect();
    popup.style.top = (rect.bottom + 4) + 'px';
    popup.style.left = Math.min(rect.left, window.innerWidth - 120) + 'px';
    popup.classList.remove('hidden');
    // Mark selected
    popup.querySelectorAll('.cp-swatch').forEach(sw => {
      sw.classList.toggle('selected', sw.dataset.colorId === (sectionColors[secIdx] || 'none'));
    });
  }

  function closePopup() {
    popup.classList.add('hidden');
    popupTarget = -1;
  }

  popup.addEventListener('click', e => {
    const sw = e.target.closest('.cp-swatch');
    if (!sw || popupTarget < 0) return;
    const cid = sw.dataset.colorId;
    applyColor(popupTarget, cid === 'none' ? null : cid);
    applyFilters();
    closePopup();
    autoSave();
  });

  document.addEventListener('click', e => {
    if (!popup.classList.contains('hidden') && !popup.contains(e.target) && !e.target.closest('.color-dot')) {
      closePopup();
    }
  });

  function applyColor(idx, colorId) {
    sectionColors[idx] = colorId;
    const sec = sections[idx];
    if (!colorId) {
      sec.removeAttribute('data-color');
      sec.style.removeProperty('--sec-hdr-bg');
      sec.style.removeProperty('--sec-ta-bg');
      sec.style.removeProperty('--sec-ta-focus');
      sec.style.removeProperty('--sec-border');
      sec.style.removeProperty('--sec-title');
      sec.style.removeProperty('--sec-dot');
      dots[idx].style.background = '#333';
      return;
    }
    const entry = PALETTE.find(p => p.id === colorId);
    if (!entry) return;
    const t = themeBase() === 'light' ? entry.light : entry.dark;
    sec.setAttribute('data-color', colorId);
    sec.style.setProperty('--sec-hdr-bg', t.hdr);
    sec.style.setProperty('--sec-ta-bg', t.ta);
    sec.style.setProperty('--sec-ta-focus', t.taFocus);
    sec.style.setProperty('--sec-border', t.border);
    sec.style.setProperty('--sec-title', t.title);
    sec.style.setProperty('--sec-dot', t.dot);
    dots[idx].style.background = entry.dot;
  }

  function reapplyAllColors() {
    sectionColors.forEach((c, i) => applyColor(i, c));
  }

  // ── Build grid ──
  const grid = document.getElementById('grid');
  const textareas = [];
  const textareas2 = new Array(SECTIONS).fill(null); // secondary pane (when split)
  const cellBodies = [];
  const titles = [];
  const wordCounts = [];
  const sections = [];
  const dots = [];
  const splitBtns = [];

  for (let i = 0; i < SECTIONS; i++) {
    const sec = document.createElement('div');
    sec.className = 'section';
    sections.push(sec);

    const hdr = document.createElement('div');
    hdr.className = 'section-header';

    const titleInput = document.createElement('input');
    titleInput.className = 'section-title';
    titleInput.placeholder = `Section ${i + 1}`;
    titleInput.type = 'text';
    titleInput.spellcheck = false;
    titles.push(titleInput);

    const wc = document.createElement('span');
    wc.className = 'word-count';
    wc.textContent = '0w';
    wordCounts.push(wc);

    // Color dot
    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.title = 'Set section color';
    dot.style.background = '#333';
    dots.push(dot);
    (idx => {
      dot.addEventListener('click', e => {
        e.stopPropagation();
        if (popupTarget === idx && !popup.classList.contains('hidden')) { closePopup(); return; }
        openPopup(idx, dot);
      });
    })(i);

    // Split control
    const splitBtn = document.createElement('button');
    splitBtn.className = 'split-btn';
    splitBtn.textContent = '⊞';
    splitBtn.title = 'Split this cell';
    splitBtns.push(splitBtn);
    (idx => {
      splitBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (splitTarget === idx && !splitPopup.classList.contains('hidden')) { closeSplitPopup(); return; }
        openSplitPopup(idx, splitBtn);
      });
    })(i);

    hdr.appendChild(titleInput);
    hdr.appendChild(wc);
    hdr.appendChild(splitBtn);
    hdr.appendChild(dot);

    const body = document.createElement('div');
    body.className = 'cell-body';
    cellBodies.push(body);

    const ta = makeTextarea(i);
    textareas.push(ta);
    body.appendChild(ta);

    sec.appendChild(hdr);
    sec.appendChild(body);
    grid.appendChild(sec);

    titleInput.addEventListener('input', autoSave);
  }

  // Create a configured textarea (used for primary and secondary panes)
  function makeTextarea(i, secondary) {
    const ta = document.createElement('textarea');
    ta.className = 'textarea';
    ta.placeholder = 'notes…';
    ta.spellcheck = false;
    ta.style.fontSize = sectionFontSizes[i] + 'px';
    ta.addEventListener('input', () => { updateWordCount(i); autoSave(); });
    ta.addEventListener('focus', () => { activeSectionIdx = i; updateFontSizeUI(); });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, start) + '\t' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
        updateWordCount(i);
        autoSave();
      }
    });
    return ta;
  }

  // ── Cell splitting ──
  const splitPopup = document.getElementById('split-popup');
  let splitTarget = -1;

  function openSplitPopup(idx, btnEl) {
    splitTarget = idx;
    const rect = btnEl.getBoundingClientRect();
    splitPopup.classList.remove('hidden');
    splitPopup.style.top = (rect.bottom + 4) + 'px';
    splitPopup.style.left = Math.min(rect.left, window.innerWidth - 110) + 'px';
  }
  function closeSplitPopup() {
    splitPopup.classList.add('hidden');
    splitTarget = -1;
  }
  splitPopup.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn || splitTarget < 0) return;
    const mode = btn.dataset.split === 'none' ? null : btn.dataset.split;
    setSplit(splitTarget, mode);
    closeSplitPopup();
    autoSave();
  });
  document.addEventListener('click', e => {
    if (!splitPopup.classList.contains('hidden') && !splitPopup.contains(e.target) && !e.target.closest('.split-btn')) {
      closeSplitPopup();
    }
  });

  // Apply / change a section's split layout, preserving content
  function setSplit(i, mode) {
    splitModes[i] = mode;
    const body = cellBodies[i];
    const primary = textareas[i];
    body.innerHTML = '';                 // detaches children; element refs (and their values) survive
    primary.style.flex = '';
    body.classList.toggle('split', !!mode);
    body.style.flexDirection = mode === 'col' ? 'column' : 'row';
    body.appendChild(primary);
    splitBtns[i].textContent = mode ? '⊟' : '⊞';
    splitBtns[i].title = mode ? 'Change / merge split' : 'Split this cell';
    if (!mode) { updateWordCount(i); return; }
    if (!textareas2[i]) textareas2[i] = makeTextarea(i, true);
    const splitter = document.createElement('div');
    splitter.className = 'cell-splitter';
    attachSplitterDrag(splitter, i);
    body.appendChild(splitter);
    body.appendChild(textareas2[i]);
    const p = splitPos[i];
    primary.style.flex = '0 0 ' + p + '%';
    textareas2[i].style.flex = '0 0 ' + (100 - p) + '%';
    updateWordCount(i);
  }

  function attachSplitterDrag(splitter, i) {
    splitter.addEventListener('mousedown', e => {
      e.preventDefault();
      const body = cellBodies[i];
      const rect = body.getBoundingClientRect();
      const horizontal = splitModes[i] === 'row'; // panes left/right
      function onMove(ev) {
        let pct = horizontal
          ? (ev.clientX - rect.left) / rect.width * 100
          : (ev.clientY - rect.top) / rect.height * 100;
        pct = Math.max(12, Math.min(88, pct));
        splitPos[i] = pct;
        textareas[i].style.flex = '0 0 ' + pct + '%';
        textareas2[i].style.flex = '0 0 ' + (100 - pct) + '%';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.userSelect = '';
        autoSave();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.body.style.userSelect = 'none';
    });
  }

  function countWords(s) {
    const t = s.trim();
    return t ? t.split(/\s+/).length : 0;
  }
  function updateWordCount(i) {
    let n = countWords(textareas[i].value);
    if (splitModes[i] && textareas2[i]) n += countWords(textareas2[i].value);
    wordCounts[i].textContent = n + 'w';
  }

  // ── Persistence ──
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.theme) applyTheme(data.theme, false);
      (data.notes || []).forEach((n, i) => {
        if (i >= SECTIONS) return;
        textareas[i].value = n.text || '';
        titles[i].value = n.title || '';
        if (n.color !== undefined) sectionColors[i] = n.color;
        if (n.fontSize) { sectionFontSizes[i] = n.fontSize; textareas[i].style.fontSize = n.fontSize + 'px'; }
        if (n.split) {
          splitPos[i] = (typeof n.splitPos === 'number') ? n.splitPos : 50;
          setSplit(i, n.split);
          if (textareas2[i]) {
            textareas2[i].value = n.text2 || '';
            textareas2[i].style.fontSize = sectionFontSizes[i] + 'px';
          }
        }
        updateWordCount(i);
      });
      if (typeof data.cardHeight === 'number' || data.cardHeight === null) {
        cardHeight = data.cardHeight;
      }
      applyCardHeight();
      reapplyAllColors();
      updateFontSizeUI();
    } catch (e) {}
  }

  function autoSave() {
    const notes = textareas.map((ta, i) => ({
      text: ta.value,
      title: titles[i].value,
      color: sectionColors[i] || null,
      fontSize: sectionFontSizes[i],
      split: splitModes[i] || null,
      splitPos: splitPos[i],
      text2: textareas2[i] ? textareas2[i].value : ''
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ notes, theme, cardHeight }));
    flashStatus();
  }

  let statusTimer;
  function flashStatus() {
    const el = document.getElementById('status');
    el.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => el.classList.remove('show'), 1200);
  }

  // ── Per-section font size ──
  function updateFontSizeUI() {
    const display = document.getElementById('font-size-display');
    const btnUp   = document.getElementById('font-up');
    const btnDown = document.getElementById('font-down');
    if (activeSectionIdx < 0) {
      display.textContent = '—';
      btnUp.disabled = true;
      btnDown.disabled = true;
    } else {
      const sz = sectionFontSizes[activeSectionIdx];
      display.textContent = sz;
      btnUp.disabled   = sz >= 24;
      btnDown.disabled = sz <= 9;
    }
  }

  function setSectionFontSize(idx, size, save = true) {
    if (idx < 0 || idx >= SECTIONS) return;
    sectionFontSizes[idx] = Math.max(9, Math.min(24, size));
    textareas[idx].style.fontSize = sectionFontSizes[idx] + 'px';
    if (textareas2[idx]) textareas2[idx].style.fontSize = sectionFontSizes[idx] + 'px';
    if (idx === activeSectionIdx) updateFontSizeUI();
    if (save) autoSave();
  }

  document.getElementById('font-up').addEventListener('click', () => {
    if (activeSectionIdx < 0) return;
    setSectionFontSize(activeSectionIdx, sectionFontSizes[activeSectionIdx] + 1);
    textareas[activeSectionIdx].focus();
  });
  document.getElementById('font-down').addEventListener('click', () => {
    if (activeSectionIdx < 0) return;
    setSectionFontSize(activeSectionIdx, sectionFontSizes[activeSectionIdx] - 1);
    textareas[activeSectionIdx].focus();
  });

  // Init buttons as disabled until a section is focused
  updateFontSizeUI();

  // ── Uniform card height (all cards at once) ──
  let cardHeight = null; // null = Fit (auto rows to viewport)
  const CARD_H_MIN = 120, CARD_H_MAX = 600, CARD_H_STEP = 40;

  function updateCardHeightUI() {
    document.getElementById('card-h-display').textContent =
      cardHeight === null ? 'Auto' : cardHeight + 'px';
    document.getElementById('card-h-up').disabled   = cardHeight !== null && cardHeight >= CARD_H_MAX;
    document.getElementById('card-h-down').disabled  = cardHeight !== null && cardHeight <= CARD_H_MIN;
  }

  function applyCardHeight() {
    if (cardHeight === null) {
      grid.classList.remove('fixed-height');
      grid.style.removeProperty('--card-h');
    } else {
      grid.style.setProperty('--card-h', cardHeight + 'px');
      grid.classList.add('fixed-height');
    }
    updateCardHeightUI();
  }

  function setCardHeight(h, save = true) {
    if (h === null) cardHeight = null;
    else cardHeight = Math.max(CARD_H_MIN, Math.min(CARD_H_MAX, h));
    applyCardHeight();
    if (save) autoSave();
  }

  document.getElementById('card-h-up').addEventListener('click', () => {
    setCardHeight(cardHeight === null ? 240 : cardHeight + CARD_H_STEP);
  });
  document.getElementById('card-h-down').addEventListener('click', () => {
    setCardHeight(cardHeight === null ? 200 : cardHeight - CARD_H_STEP);
  });
  document.getElementById('card-h-auto').addEventListener('click', () => {
    setCardHeight(null);
  });
  updateCardHeightUI();

  // ── Theme ──
  // Each theme maps to a palette base ('dark' or 'light') for section tinting.
  const THEMES = [
    { id: 'dark',     label: 'Dark',     base: 'dark'  },
    { id: 'light',    label: 'Light',    base: 'light' },
    { id: 'midnight', label: 'Midnight', base: 'dark'  },
    { id: 'dracula',  label: 'Dracula',  base: 'dark'  },
    { id: 'carbon',   label: 'Carbon',   base: 'dark'  },
    { id: 'nord',     label: 'Nord',     base: 'dark'  },
    { id: 'matrix',   label: 'Matrix',   base: 'dark'  },
    { id: 'crimson',  label: 'Crimson',  base: 'dark'  },
    { id: 'ocean',    label: 'Ocean',    base: 'dark'  },
    { id: 'amber',    label: 'Amber',    base: 'light' },
    { id: 'slate',    label: 'Slate',    base: 'light' },
  ];
  function themeBase() {
    const t = THEMES.find(x => x.id === theme);
    return t ? t.base : 'dark';
  }
  function applyTheme(t, save = true) {
    if (!THEMES.some(x => x.id === t)) t = 'dark';
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    const meta = THEMES.find(x => x.id === t);
    document.getElementById('theme-btn').textContent = '◑ ' + meta.label;
    reapplyAllColors();
    if (save) autoSave();
  }
  function cycleTheme() {
    const idx = THEMES.findIndex(x => x.id === theme);
    applyTheme(THEMES[(idx + 1) % THEMES.length].id);
  }
  document.getElementById('theme-btn').addEventListener('click', cycleTheme);

  // ── Search ──
  const searchInput = document.getElementById('search-input');
  const searchCountEl = document.getElementById('search-count');

  // All visible panes (primary + any split secondary), in section order
  function allPanes() {
    const panes = [];
    for (let i = 0; i < SECTIONS; i++) {
      panes.push(textareas[i]);
      if (splitModes[i] && textareas2[i]) panes.push(textareas2[i]);
    }
    return panes;
  }

  function doSearch() {
    searchMatches = [];
    const q = searchInput.value;
    if (!q) { searchCountEl.textContent = ''; searchIndex = -1; return; }
    const lower = q.toLowerCase();
    allPanes().forEach(ta => {
      const val = ta.value.toLowerCase();
      let pos = 0;
      while ((pos = val.indexOf(lower, pos)) !== -1) {
        searchMatches.push({ ta, pos, len: q.length });
        pos += q.length;
      }
    });
    if (searchMatches.length) {
      searchIndex = 0;
      searchCountEl.textContent = `1/${searchMatches.length}`;
      scrollToMatch(0);
    } else {
      searchCountEl.textContent = 'no match';
      searchIndex = -1;
    }
  }

  function scrollToMatch(idx) {
    if (!searchMatches.length || idx < 0) return;
    const m = searchMatches[idx];
    const ta = m.ta;
    ta.focus();
    ta.setSelectionRange(m.pos, m.pos + m.len);
    const lineHeight = (parseFloat(getComputedStyle(ta).fontSize) || 13) * 1.55;
    const lineNum = (ta.value.slice(0, m.pos).match(/\n/g) || []).length;
    ta.scrollTop = Math.max(0, lineNum * lineHeight - ta.clientHeight / 2);
    searchCountEl.textContent = `${idx + 1}/${searchMatches.length}`;
  }

  searchInput.addEventListener('input', doSearch);
  document.getElementById('search-next').addEventListener('click', () => {
    if (!searchMatches.length) return;
    searchIndex = (searchIndex + 1) % searchMatches.length;
    scrollToMatch(searchIndex);
  });
  document.getElementById('search-prev').addEventListener('click', () => {
    if (!searchMatches.length) return;
    searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
    scrollToMatch(searchIndex);
  });
  document.getElementById('search-clear').addEventListener('click', () => {
    searchInput.value = '';
    searchMatches = [];
    searchIndex = -1;
    searchCountEl.textContent = '';
  });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (e.shiftKey) document.getElementById('search-prev').click();
      else document.getElementById('search-next').click();
    }
    if (e.key === 'Escape') document.getElementById('search-clear').click();
  });

  // ── Save as HTML ──
  function saveHTML() {
    // Capture every pane's value in document order (handles split cells)
    const paneText = Array.from(document.querySelectorAll('.textarea')).map(t => t.value);
    const titleText = Array.from(document.querySelectorAll('.section-title')).map(t => t.value);
    const savedScript = `
<script>
(function(){
  var paneText = ${JSON.stringify(paneText)};
  var titleText = ${JSON.stringify(titleText)};
  var tas = document.querySelectorAll('.textarea');
  var tis = document.querySelectorAll('.section-title');
  paneText.forEach(function(v,i){ if(tas[i]) tas[i].value = v||''; });
  titleText.forEach(function(v,i){ if(tis[i]) tis[i].value = v||''; });
})();
<\/script>`;
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML.replace('</body>', savedScript + '\n</body>');
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'notes.html';
    a.click();
    flashStatus();
  }

  document.getElementById('save-btn').addEventListener('click', saveHTML);

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveHTML(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    // Quick "/" focuses search when not already typing in a field
    if (e.key === '/' && !e.metaKey && !e.ctrlKey && !e.altKey) {
      const tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
    }
  });

  // ── Clear all ──
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (!confirm('Clear all sections? This cannot be undone.')) return;
    textareas.forEach((ta, i) => {
      ta.value = '';
      titles[i].value = '';
      sectionColors[i] = null;
      applyColor(i, null);
      if (textareas2[i]) textareas2[i].value = '';
      splitPos[i] = 50;
      if (splitModes[i]) setSplit(i, null);
      updateWordCount(i);
    });
    applyFilters();
    autoSave();
  });

  // ── Init ──
  loadState();
  applyFilters();
})();
</script>
</body>
</html>
