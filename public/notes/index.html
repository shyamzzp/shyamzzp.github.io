<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<script>/* Apply the saved theme before paint to avoid a flash of the default theme */
try { var _t = localStorage.getItem('notes_theme'); if (_t) document.documentElement.setAttribute('data-theme', _t); } catch (e) {}</script>
<style>
  :root {
    --bg: #0a0e0a;
    --cell-bg: #050705;
    --border: #2a3a2a;
    --text: #6fe06f;
    --title-text: #9cf09c;
    --title-bg: #0f140f;
    --placeholder: #4a6f4a;
    --toolbar-bg: #0f140f;
    --toolbar-border: #2c3c2c;
    --btn-bg: #162016;
    --btn-hover: #21321f;
    --btn-text: #7ad67a;
    --search-bg: #0f140f;
    --search-border: #3a6a3a;
    --highlight: rgba(80,255,80,0.28);
    --highlight-active: rgba(80,255,80,0.55);
    --count-text: #5a9a5a;
    --font-size: 13px;
  }
  html[data-theme="light"] {
    --bg: #f0f4f0;
    --cell-bg: #fff;
    --border: #d0dcd0;
    --text: #1a5c1a;
    --title-text: #0f4a0f;
    --title-bg: #e8f0e8;
    --placeholder: #aacaaa;
    --toolbar-bg: #e4ece4;
    --toolbar-border: #c4d4c4;
    --btn-bg: #dce8dc;
    --btn-hover: #c8dcc8;
    --btn-text: #1a5c1a;
    --search-bg: #fff;
    --search-border: #88bb88;
    --highlight: rgba(0,160,0,0.18);
    --highlight-active: rgba(0,160,0,0.38);
    --count-text: #5a9a5a;
  }
  /* Midnight — deep blue dark */
  html[data-theme="midnight"] {
    --bg: #060a14;
    --cell-bg: #04060d;
    --border: #14203a;
    --text: #6fa8dc;
    --title-text: #8fc1ee;
    --title-bg: #0a1020;
    --placeholder: #2a3a55;
    --toolbar-bg: #0a1020;
    --toolbar-border: #1c2c48;
    --btn-bg: #101a2e;
    --btn-hover: #1a2a48;
    --btn-text: #6fa8dc;
    --search-bg: #0a1020;
    --search-border: #2a4a7a;
    --highlight: rgba(80,160,255,0.25);
    --highlight-active: rgba(80,160,255,0.5);
    --count-text: #3a5a8a;
  }
  /* Dracula — purple/pink dark */
  html[data-theme="dracula"] {
    --bg: #1a1626;
    --cell-bg: #14101f;
    --border: #322a44;
    --text: #c9a8e9;
    --title-text: #ff79c6;
    --title-bg: #221b33;
    --placeholder: #4a3a5e;
    --toolbar-bg: #221b33;
    --toolbar-border: #3a3050;
    --btn-bg: #2a2240;
    --btn-hover: #3a2e54;
    --btn-text: #c9a8e9;
    --search-bg: #221b33;
    --search-border: #6a4a8a;
    --highlight: rgba(255,121,198,0.22);
    --highlight-active: rgba(255,121,198,0.45);
    --count-text: #6a5a8a;
  }
  /* Carbon — neutral monochrome dark */
  html[data-theme="carbon"] {
    --bg: #121212;
    --cell-bg: #0c0c0c;
    --border: #2e2e2e;
    --text: #d0d0d0;
    --title-text: #f0f0f0;
    --title-bg: #1a1a1a;
    --placeholder: #5a5a5a;
    --toolbar-bg: #1a1a1a;
    --toolbar-border: #2e2e2e;
    --btn-bg: #222;
    --btn-hover: #2e2e2e;
    --btn-text: #d0d0d0;
    --search-bg: #1a1a1a;
    --search-border: #4a4a4a;
    --highlight: rgba(255,255,255,0.18);
    --highlight-active: rgba(255,255,255,0.38);
    --count-text: #8a8a8a;
  }
  /* Nord — arctic blue-grey dark */
  html[data-theme="nord"] {
    --bg: #2e3440;
    --cell-bg: #272c36;
    --border: #3b4252;
    --text: #d8dee9;
    --title-text: #88c0d0;
    --title-bg: #323845;
    --placeholder: #616e88;
    --toolbar-bg: #323845;
    --toolbar-border: #3b4252;
    --btn-bg: #3b4252;
    --btn-hover: #434c5e;
    --btn-text: #d8dee9;
    --search-bg: #2e3440;
    --search-border: #5e81ac;
    --highlight: rgba(136,192,208,0.25);
    --highlight-active: rgba(136,192,208,0.5);
    --count-text: #7b88a1;
  }
  /* Matrix — intense green terminal */
  html[data-theme="matrix"] {
    --bg: #000700;
    --cell-bg: #000300;
    --border: #0f4f0f;
    --text: #00ff66;
    --title-text: #66ff99;
    --title-bg: #021202;
    --placeholder: #1f6f3f;
    --toolbar-bg: #021202;
    --toolbar-border: #0f4f0f;
    --btn-bg: #041a04;
    --btn-hover: #0a2e0a;
    --btn-text: #00ff66;
    --search-bg: #021202;
    --search-border: #1f8f4f;
    --highlight: rgba(0,255,102,0.3);
    --highlight-active: rgba(0,255,102,0.6);
    --count-text: #2f9f5f;
  }
  /* Crimson — dark red ember */
  html[data-theme="crimson"] {
    --bg: #160a0c;
    --cell-bg: #100608;
    --border: #3a1a20;
    --text: #e8a0aa;
    --title-text: #ff8090;
    --title-bg: #1e0e12;
    --placeholder: #6a3a42;
    --toolbar-bg: #1e0e12;
    --toolbar-border: #3a1a20;
    --btn-bg: #281418;
    --btn-hover: #381e24;
    --btn-text: #e8a0aa;
    --search-bg: #1e0e12;
    --search-border: #7a3a44;
    --highlight: rgba(255,100,120,0.22);
    --highlight-active: rgba(255,100,120,0.45);
    --count-text: #9a5a62;
  }
  /* Ocean — deep teal dark */
  html[data-theme="ocean"] {
    --bg: #021418;
    --cell-bg: #010d10;
    --border: #0a3640;
    --text: #7fdbd0;
    --title-text: #5fe0d8;
    --title-bg: #04181d;
    --placeholder: #2f5f64;
    --toolbar-bg: #04181d;
    --toolbar-border: #0a3640;
    --btn-bg: #062228;
    --btn-hover: #0a3038;
    --btn-text: #7fdbd0;
    --search-bg: #04181d;
    --search-border: #1f6a70;
    --highlight: rgba(95,224,216,0.24);
    --highlight-active: rgba(95,224,216,0.48);
    --count-text: #4f8f90;
  }
  /* Amber — warm sepia light */
  html[data-theme="amber"] {
    --bg: #f3ecdd;
    --cell-bg: #fdf8ee;
    --border: #ddd0b8;
    --text: #6b4f1d;
    --title-text: #523b13;
    --title-bg: #ece1cc;
    --placeholder: #c2b18d;
    --toolbar-bg: #e8dcc4;
    --toolbar-border: #cebf9f;
    --btn-bg: #e0d3b8;
    --btn-hover: #d4c4a4;
    --btn-text: #6b4f1d;
    --search-bg: #fdf8ee;
    --search-border: #b89a5e;
    --highlight: rgba(180,120,0,0.2);
    --highlight-active: rgba(180,120,0,0.4);
    --count-text: #9a8458;
  }
  /* Slate — cool grey light */
  html[data-theme="slate"] {
    --bg: #e9edf1;
    --cell-bg: #fbfcfd;
    --border: #cbd3dc;
    --text: #2d3e50;
    --title-text: #1b2a3a;
    --title-bg: #dde3ea;
    --placeholder: #a8b4c0;
    --toolbar-bg: #d8dee6;
    --toolbar-border: #bcc6d2;
    --btn-bg: #d0d8e0;
    --btn-hover: #c0cad6;
    --btn-text: #2d3e50;
    --search-bg: #fbfcfd;
    --search-border: #8a9aac;
    --highlight: rgba(40,90,150,0.18);
    --highlight-active: rgba(40,90,150,0.38);
    --count-text: #6a7888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  /* ── Toolbar ── */
  #toolbar {
    --tb-h: 26px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .tb-group {
    display: flex;
    align-items: center;
    gap: 3px;
    height: var(--tb-h);
  }

  /* Uniform height for all interactive toolbar controls */
  #toolbar button,
  #toolbar input,
  #toolbar select,
  #toolbar #font-size-display {
    height: var(--tb-h);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .tb-sep {
    width: 1px;
    height: 18px;
    background: var(--toolbar-border);
    margin: 0 3px;
  }

  button {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--toolbar-border);
    padding: 3px 8px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 2px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  button:hover { background: var(--btn-hover); }
  button.active { background: var(--btn-hover); border-color: var(--text); }

  #font-size-display {
    color: var(--count-text);
    font-size: 11px;
    font-family: 'Courier New', monospace;
    min-width: 28px;
    text-align: center;
  }
  #font-size-label, .tb-meta-label {
    color: var(--count-text);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    opacity: 0.55;
    margin-left: 2px;
  }
  button:disabled { opacity: 0.3; cursor: default; }

  #search-input {
    background: var(--search-bg);
    color: var(--text);
    border: 1px solid var(--search-border);
    padding: 3px 8px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 2px;
    width: 190px;
    outline: none;
  }
  #search-input::placeholder { color: var(--placeholder); }
  #search-input:focus { border-color: var(--text); }

  #search-count {
    color: var(--count-text);
    font-size: 11px;
    min-width: 50px;
  }

  #font-family-select {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: 1px solid var(--toolbar-border);
    padding: 3px 6px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border-radius: 2px;
    cursor: pointer;
    outline: none;
    max-width: 130px;
  }
  #font-family-select:focus { border-color: var(--text); }

  #status {
    margin-left: auto;
    color: var(--count-text);
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #status.show { opacity: 1; }

  /* ── Grid ── */
  /* Infinite vertical scroller: 4 columns (25% each), rows of --card-h.
     New rows are appended as you scroll. */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: var(--card-h, 25vh);
    flex: 1;
    gap: 0;
    overflow-y: auto;
    overflow-x: hidden;
  }
  /* Mobile: two columns per row */
  @media (max-width: 640px) {
    #grid { grid-template-columns: repeat(2, 1fr); }
  }

  .section {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--title-bg);
    border-bottom: 1px solid var(--border);
    padding: 2px 6px;
    flex-shrink: 0;
  }

  .section-title {
    color: var(--title-text);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    cursor: text;
  }
  .section-title::placeholder { color: var(--placeholder); }

  .word-count {
    color: var(--count-text);
    font-size: 9px;
    white-space: nowrap;
    margin-left: 6px;
    flex-shrink: 0;
  }

  .textarea {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: none;
    outline: none;
    padding: 8px 10px;
    font-family: var(--note-font, 'Courier New', monospace);
    font-size: var(--font-size);
    line-height: 1.55;
    resize: none;
    width: 100%;
    position: relative;
    z-index: 1;
    caret-color: var(--text);
  }
  .textarea::placeholder { color: var(--placeholder); }

  /* ── Pane wrapper + in-text highlight backdrop ── */
  .pane {
    position: relative;
    flex: 1;
    display: flex;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    background: var(--cell-bg);
  }
  .pane:focus-within { background: color-mix(in srgb, var(--cell-bg) 85%, var(--text) 15%); }

  .hl-backdrop {
    position: absolute;
    inset: 0;
    margin: 0;
    padding: 8px 10px;
    font-family: var(--note-font, 'Courier New', monospace);
    font-size: var(--font-size);
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    color: transparent;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  /* Token highlights — only background / inset shadow (layout-neutral so the
     transparent backdrop stays aligned with the textarea text). */
  .hl { border-radius: 2px; }
  /* Urgency U1 (low) … U4 (high), U5 critical — filled */
  .hl-u1 { background: rgba(46,204,113,0.45); }   /* green  */
  .hl-u2 { background: rgba(52,152,219,0.45); }   /* blue   */
  .hl-u3 { background: rgba(243,156,18,0.52); }   /* orange */
  .hl-u4 { background: rgba(231,76,60,0.58); }    /* red    */
  .hl-u5 { background: rgba(155,89,182,0.55); }   /* purple */
  /* Priority P1..P5 — outlined ring (distinct from urgency fills) */
  .hl-p1 { box-shadow: inset 0 0 0 1.5px rgba(46,204,113,0.85); }
  .hl-p2 { box-shadow: inset 0 0 0 1.5px rgba(52,152,219,0.85); }
  .hl-p3 { box-shadow: inset 0 0 0 1.5px rgba(243,156,18,0.9); }
  .hl-p4 { box-shadow: inset 0 0 0 1.5px rgba(231,76,60,0.9); }
  .hl-p5 { box-shadow: inset 0 0 0 1.5px rgba(155,89,182,0.9); }
  /* Status keywords */
  .hl-done  { background: rgba(46,204,113,0.5); }    /* DONE / FIXED   */
  .hl-todo  { background: rgba(241,196,15,0.5); }    /* TODO / WIP     */
  .hl-alert { background: rgba(231,76,60,0.62); }    /* BUG / URGENT   */
  /* Mentions, tags, dates */
  .hl-mention { background: rgba(52,152,219,0.42); }
  .hl-tag     { background: rgba(26,188,156,0.42); }
  .hl-date    { background: rgba(149,165,166,0.4); }

  /* ── Card flip (front board / back: next-day task) ── */
  .flip-inner { flex: 1; display: flex; min-height: 0; min-width: 0; }
  .card-back {
    flex: 1; display: none; flex-direction: column;
    min-height: 0; background: var(--cell-bg);
  }
  .section.flipped .cell-body { display: none; }
  .section.flipped .card-back { display: flex; }
  .card-back-label {
    flex-shrink: 0;
    font-family: 'Courier New', monospace;
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--title-text);
    padding: 3px 8px;
    background: color-mix(in srgb, var(--text) 14%, var(--title-bg));
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-back-label .hint { opacity: 0.6; text-transform: none; letter-spacing: 0; }
  .section.flip-anim .flip-inner { animation: cardFlip 0.4s ease; }
  @keyframes cardFlip {
    from { transform: perspective(700px) rotateY(-90deg); opacity: 0.15; }
    to   { transform: none; opacity: 1; }
  }

  /* ── Cell body & split panes ── */
  .cell-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
  }
  .cell-body.split > .textarea { flex: 0 0 50%; }

  .cell-splitter {
    flex: 0 0 5px;
    background: var(--border);
    position: relative;
    z-index: 2;
  }
  .cell-splitter:hover { background: var(--text); }
  .cell-body[style*="row"] > .cell-splitter,
  .cell-body:not([style*="column"]) > .cell-splitter { cursor: col-resize; }
  .cell-body[style*="column"] > .cell-splitter { cursor: row-resize; }

  /* Split control button in header */
  .split-btn {
    background: transparent;
    border: none;
    color: var(--count-text);
    font-size: 11px;
    line-height: 1;
    padding: 0 3px;
    height: auto;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 2px;
  }
  .split-btn:hover { color: var(--text); background: transparent; }

  /* Split picker popup */
  .split-popup {
    position: absolute;
    z-index: 100;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-radius: 4px;
    padding: 4px;
    display: flex;
    gap: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .split-popup.hidden { display: none; }
  .split-popup button {
    font-size: 14px;
    padding: 4px 8px;
    line-height: 1;
  }

  /* Search highlight */
  mark.sh { background: var(--highlight); color: inherit; border-radius: 1px; }
  mark.sh.active { background: var(--highlight-active); }

  /* ── Color coding ── */
  /* Color dot button in header */
  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 4px;
    transition: transform 0.1s;
  }
  .color-dot:hover { transform: scale(1.3); }

  /* Color picker popup */
  .color-picker-popup {
    position: absolute;
    z-index: 100;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-radius: 4px;
    padding: 5px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    width: 112px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .color-picker-popup.hidden { display: none; }

  .cp-swatch {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, transform 0.1s;
  }
  .cp-swatch:hover { transform: scale(1.15); }
  .cp-swatch.selected { border-color: #fff; }

  /* ── Color filter bar ── */
  .filter-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, transform 0.1s, opacity 0.1s;
    opacity: 0.55;
    position: relative;
  }
  .filter-swatch:hover { transform: scale(1.15); opacity: 0.85; }
  .filter-swatch.active { border-color: #fff; opacity: 1; }
  .filter-swatch[data-filter-id="none"] {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--btn-text);
  }
  #filter-label {
    color: var(--count-text);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    opacity: 0.55;
    margin-right: 2px;
  }

  /* Sections hidden by an active color filter */
  .section.filtered-out { display: none; }

  /* Drag-to-move */
  .drag-handle {
    cursor: grab;
    color: var(--count-text);
    font-size: 11px;
    line-height: 1;
    padding: 0 4px 0 0;
    flex-shrink: 0;
    user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .section.dragging { opacity: 0.45; }
  .section.drag-over { outline: 2px dashed var(--text); outline-offset: -2px; }

  /* Section tinting — derived from the section's color (--sec-dot) so the
     highlight is clearly visible. View mode is the boldest tint; focus
     eases it off for comfortable editing. */
  .section[data-color] .section-header {
    background: color-mix(in srgb, var(--sec-dot) 40%, var(--title-bg));
    border-bottom-color: var(--sec-border);
  }
  .section[data-color] {
    border-right-color: var(--sec-border);
    border-bottom-color: var(--sec-border);
  }
  .section[data-color] .pane {
    background: color-mix(in srgb, var(--sec-dot) 22%, var(--cell-bg));
  }
  .section[data-color] .pane:focus-within {
    background: color-mix(in srgb, var(--sec-dot) 10%, var(--cell-bg));
  }
  .section[data-color] .section-title {
    color: var(--sec-title);
  }
  .section[data-color] .color-dot {
    background: var(--sec-dot) !important;
  }

  /* ── Login overlay (animated) ── */
  .login-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background:
      radial-gradient(1200px 600px at 50% -10%, color-mix(in srgb, var(--text) 14%, var(--bg)), var(--bg) 60%),
      var(--bg);
    animation: lo-fade 0.5s ease both;
  }
  .login-overlay.hidden { display: none; }
  /* drifting glow blobs */
  .login-overlay::before,
  .login-overlay::after {
    content: '';
    position: absolute;
    width: 46vmax; height: 46vmax;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.20;
    background: var(--text);
    animation: lo-drift 16s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .login-overlay::before { top: -16vmax; left: -10vmax; }
  .login-overlay::after  { bottom: -18vmax; right: -12vmax; animation-duration: 22s; opacity: 0.14; }
  /* faint scanline grid for terminal vibe */
  .login-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.06;
    background-image:
      linear-gradient(var(--text) 1px, transparent 1px),
      linear-gradient(90deg, var(--text) 1px, transparent 1px);
    background-size: 38px 38px;
    mask-image: radial-gradient(circle at 50% 45%, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(circle at 50% 45%, #000 30%, transparent 75%);
  }

  .login-box {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
    max-width: 88vw;
    padding: 26px 24px 22px;
    background: color-mix(in srgb, var(--toolbar-bg) 82%, transparent);
    border: 1px solid color-mix(in srgb, var(--text) 35%, var(--toolbar-border));
    border-radius: 10px;
    box-shadow:
      0 18px 60px rgba(0,0,0,0.55),
      0 0 0 1px color-mix(in srgb, var(--text) 10%, transparent),
      0 0 40px color-mix(in srgb, var(--text) 18%, transparent);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: lo-rise 0.55s cubic-bezier(.2,.8,.2,1) both;
  }
  /* animated gradient hairline at the top edge */
  .login-box::before {
    content: '';
    position: absolute; left: 14px; right: 14px; top: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--text), transparent);
    background-size: 200% 100%;
    animation: lo-sheen 3.2s linear infinite;
    border-radius: 2px;
    opacity: 0.7;
  }
  .login-logo {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--count-text);
  }
  .login-title {
    color: var(--title-text);
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: bold;
    margin: 2px 0 6px;
    display: flex;
    align-items: baseline;
    gap: 2px;
  }
  .login-title .caret {
    width: 9px; height: 18px;
    background: var(--text);
    display: inline-block;
    transform: translateY(2px);
    animation: lo-blink 1.05s step-end infinite;
  }
  .login-field {
    position: relative;
    opacity: 0;
    animation: lo-rise 0.5s ease both;
  }
  .login-field:nth-of-type(1) { animation-delay: 0.12s; }
  .login-field:nth-of-type(2) { animation-delay: 0.20s; }
  .login-box input {
    width: 100%;
    background: color-mix(in srgb, var(--search-bg) 85%, transparent);
    color: var(--text);
    border: 1px solid var(--search-border);
    padding: 11px 12px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  .login-box input:focus {
    border-color: var(--text);
    background: color-mix(in srgb, var(--cell-bg) 70%, transparent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--text) 22%, transparent);
  }
  .login-box button[type="submit"] {
    margin-top: 4px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--text) 26%, var(--btn-bg)), var(--btn-bg));
    color: var(--title-text);
    border: 1px solid color-mix(in srgb, var(--text) 45%, var(--toolbar-border));
    padding: 11px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.04em;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.18s, filter 0.18s;
    opacity: 0;
    animation: lo-rise 0.5s ease 0.28s both;
  }
  .login-box button[type="submit"]:hover {
    filter: brightness(1.15);
    box-shadow: 0 6px 20px color-mix(in srgb, var(--text) 30%, transparent);
    transform: translateY(-1px);
  }
  .login-box button[type="submit"]:active { transform: translateY(0); }
  .login-box button[type="submit"]:disabled { opacity: 0.6; cursor: default; transform: none; }
  .login-error {
    color: #ff6f61;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    min-height: 14px;
    line-height: 1.4;
  }
  .login-error.show { animation: lo-shake 0.4s ease; }

  @keyframes lo-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes lo-rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes lo-blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  @keyframes lo-sheen { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes lo-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
  @keyframes lo-drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(6vmax, 4vmax) scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) {
    .login-overlay, .login-box, .login-field, .login-box button[type="submit"] { animation: none !important; opacity: 1 !important; }
    .login-overlay::before, .login-overlay::after, .login-box::before, .login-title .caret { animation: none !important; }
  }

  /* ── Spaces sidebar (off-canvas) ── */
  #space-backdrop {
    position: fixed; inset: 0; z-index: 850;
    background: rgba(0,0,0,0.45);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #space-backdrop.open { opacity: 1; pointer-events: auto; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 860;
    width: 270px; max-width: 84vw;
    display: flex; flex-direction: column;
    background: var(--toolbar-bg);
    border-right: 1px solid var(--toolbar-border);
    box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    transform: translateX(-100%);
    transition: transform 0.24s cubic-bezier(.2,.8,.2,1);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--toolbar-border);
  }
  .sidebar-title { color: var(--title-text); font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold; }
  .sidebar-close { background: transparent; border: none; color: var(--count-text); font-size: 16px; cursor: pointer; }
  .sidebar-close:hover { color: var(--text); }
  #spaces-grid { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .space-tile {
    position: relative;
    display: flex; flex-direction: column; gap: 3px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    color: var(--text);
    background: color-mix(in srgb, var(--text) 6%, transparent);
    border: 1px solid transparent;
    font-family: 'Courier New', monospace;
    transition: background 0.15s, border-color 0.15s;
  }
  .space-tile:hover { border-color: var(--toolbar-border); background: color-mix(in srgb, var(--text) 12%, transparent); }
  .space-tile.current { border-color: var(--text); background: color-mix(in srgb, var(--text) 14%, transparent); }
  .space-tile .st-kind {
    align-self: flex-start; font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 1px 6px; border-radius: 999px;
    background: color-mix(in srgb, var(--text) 22%, transparent); color: var(--title-text);
  }
  .space-tile .st-name { font-size: 14px; font-weight: bold; color: var(--title-text); word-break: break-word; }
  .space-tile .st-meta { font-size: 9px; color: var(--count-text); }
  .space-tile .st-del {
    position: absolute; top: 8px; right: 8px;
    border: none; background: transparent; color: var(--count-text);
    cursor: pointer; font-size: 12px; opacity: 0; transition: opacity 0.15s; padding: 2px 5px; border-radius: 4px;
  }
  .space-tile:hover .st-del { opacity: 0.8; }
  .space-tile .st-del:hover { background: color-mix(in srgb, #e0503030, transparent); color: #ff6f61; }
  .sidebar-foot { padding: 10px; border-top: 1px solid var(--toolbar-border); }
  .add-space-btn {
    width: 100%; padding: 9px; border-radius: 8px; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 13px;
    background: var(--btn-bg); color: var(--title-text);
    border: 1px dashed color-mix(in srgb, var(--text) 45%, var(--toolbar-border));
  }
  .add-space-btn:hover { background: var(--btn-hover); }
  #current-space {
    color: var(--title-text); font-family: 'Courier New', monospace;
    font-size: 12px; font-weight: bold; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .new-space-form {
    margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
  }
  .new-space-form.hidden { display: none; }
  .new-space-form input, .new-space-form select, .new-space-form button {
    font-family: 'Courier New', monospace; font-size: 13px; padding: 9px 11px; border-radius: 6px;
    background: var(--search-bg); color: var(--text); border: 1px solid var(--search-border); outline: none;
  }
  .new-space-form input { min-width: 0; }
  .new-space-form button { cursor: pointer; background: var(--btn-bg); color: var(--btn-text); border-color: var(--toolbar-border); }
  .new-space-form button[type="submit"] { color: var(--title-text); border-color: color-mix(in srgb, var(--text) 45%, var(--toolbar-border)); }
  .spaces-msg { margin-top: 14px; font-family: 'Courier New', monospace; font-size: 11px; color: var(--count-text); min-height: 14px; }

  /* Card-level strike: whole card shown struck */
  .section.struck .textarea { text-decoration: line-through; text-decoration-thickness: 1px; opacity: 0.72; }
  .section.struck .section-title { text-decoration: line-through; }
  .strike-btn {
    background: transparent; border: none; color: var(--count-text);
    font-size: 11px; line-height: 1; padding: 0 3px; cursor: pointer; flex-shrink: 0;
  }
  .strike-btn:hover { color: var(--text); }
  .section.struck .strike-btn { color: var(--text); }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Spaces -->
  <div class="tb-group">
    <button id="menu-btn" title="Spaces menu">☰</button>
    <span id="current-space"></span>
  </div>
  <div class="tb-sep"></div>

  <!-- Theme -->
  <div class="tb-group">
    <button id="theme-btn" title="Toggle theme">◑ Theme</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Font size -->
  <div class="tb-group">
    <button id="font-down" title="Decrease font size (active section)">A−</button>
    <span id="font-size-display">—</span>
    <button id="font-up" title="Increase font size (active section)">A+</button>
    <span id="font-size-label">active section</span>
  </div>
  <div class="tb-sep"></div>

  <!-- Global font size (all cards) -->
  <div class="tb-group">
    <button id="gfont-down" title="Decrease font size for all cards">A−</button>
    <span id="gfont-size-display">13</span>
    <button id="gfont-up" title="Increase font size for all cards">A+</button>
    <span class="tb-meta-label">all cards</span>
  </div>
  <div class="tb-sep"></div>

  <!-- Font family (all notes) -->
  <div class="tb-group">
    <select id="font-family-select" title="Font family for all notes"></select>
  </div>
  <div class="tb-sep"></div>

  <!-- Card height (all cards at once) -->
  <div class="tb-group">
    <button id="card-h-down" title="Shorter cards">H−</button>
    <span id="card-h-display">Auto</span>
    <button id="card-h-up" title="Taller cards">H+</button>
    <button id="card-h-auto" title="Fit all cards to screen">Fit</button>
    <span class="tb-meta-label">all cards</span>
  </div>
  <div class="tb-sep"></div>

  <!-- Search -->
  <div class="tb-group">
    <input id="search-input" type="text" placeholder="Search… ( / or Ctrl+F )" title="Focus search: / or Ctrl+F" autocomplete="off" spellcheck="false">
    <button id="search-prev" title="Previous match">↑</button>
    <button id="search-next" title="Next match">↓</button>
    <span id="search-count"></span>
    <button id="search-clear" title="Clear search">✕</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Color filter -->
  <div class="tb-group">
    <span id="filter-label">Filter:</span>
    <div id="filter-swatches" class="tb-group"></div>
  </div>
  <div class="tb-sep"></div>

  <!-- Format -->
  <div class="tb-group">
    <button id="strike-btn" title="Strikethrough selected text">S&#822;</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Save -->
  <div class="tb-group">
    <button id="save-btn" title="Save as HTML (Ctrl+S)">⬇ Save</button>
    <button id="clear-btn" title="Clear all sections">⌫ Clear All</button>
  </div>
  <div class="tb-sep"></div>

  <!-- Account -->
  <div class="tb-group">
    <span id="account-email" class="tb-meta-label"></span>
    <button id="logout-btn" title="Log out" style="display:none">⎋ Logout</button>
  </div>

  <span id="status">Saved ✓</span>
</div>

<!-- Login overlay (PocketBase) -->
<div id="login-overlay" class="login-overlay hidden">
  <div class="login-grid"></div>
  <form id="login-form" class="login-box">
    <div class="login-logo">▚ NOTES</div>
    <div class="login-title">Sign in<span class="caret"></span></div>
    <div class="login-field">
      <input id="login-email" type="email" placeholder="Email" autocomplete="username" required>
    </div>
    <div class="login-field">
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required>
    </div>
    <button id="login-submit" type="submit">Sign in</button>
    <div id="login-error" class="login-error"></div>
  </form>
</div>

<!-- Spaces sidebar -->
<div id="space-backdrop"></div>
<aside id="sidebar" class="sidebar">
  <div class="sidebar-head">
    <span class="sidebar-title">Spaces</span>
    <button id="sidebar-close" class="sidebar-close" title="Close">✕</button>
  </div>
  <div id="spaces-grid"></div>
  <div class="sidebar-foot">
    <button id="add-space-btn" class="add-space-btn">+ New space</button>
    <form id="new-space-form" class="new-space-form hidden">
      <input id="new-space-name" type="text" placeholder="Space name (e.g. Personal)" autocomplete="off" required>
      <select id="new-space-kind">
        <option value="personal">Personal</option>
        <option value="office">Office</option>
        <option value="other">Other</option>
      </select>
      <button type="submit">Create</button>
      <button type="button" id="new-space-cancel">Cancel</button>
    </form>
    <div id="spaces-msg" class="spaces-msg"></div>
  </div>
</aside>

<!-- Shared floating color picker -->
<div id="color-popup" class="color-picker-popup hidden"></div>

<!-- Shared floating split picker -->
<div id="split-popup" class="split-popup hidden">
  <button data-split="row" title="Split side by side">⬌</button>
  <button data-split="col" title="Split stacked (top / bottom)">⬍</button>
  <button data-split="none" title="Merge into one">✕</button>
</div>

<div id="grid"></div>

<script>
(function () {
  const COLS = 4;              // cells per row (each 25% wide)
  const INITIAL_ROWS = 6;      // rows created on first load
  const GROW_ROWS = 4;         // rows appended each time the user nears the end
  const STORAGE_KEY = 'notes_v3';
  // ── PocketBase storage ──
  const PB_URL = 'https://shyamzzp.pockethost.io';
  const PB_COLLECTION = 'notes';     // collection: fields key (text) + data (json)
  const PB_AUTH_KEY = 'pb_auth_notes';
  const SUPERUSER_KEY = 'board';      // record key used when signed in as admin/superuser
  // Exported standalone snapshots carry a seed and run fully offline (no login).
  const OFFLINE = !!window.__NOTES_SEED__;
  let authToken = null, authUserId = null, authEmail = null, recordId = null, isSuperuser = false;
  let searchMatches = [];
  let searchIndex = -1;
  let theme = 'dark';
  // Section state grows dynamically (infinite scroll); arrays are appended to.
  const sectionColors = [];     // null = default
  const sectionStruck = [];     // per-card strikethrough flag
  const backTextareas = [];     // per-card "next-day task" (back face)
  const sectionFontSizes = [];  // per-section font size
  const splitModes = [];        // null | 'row' (side by side) | 'col' (stacked)
  const splitPos = [];          // first pane size, percent
  let activeSectionIdx = -1; // index of currently focused textarea
  let dragSrcIdx = -1;       // section index being dragged
  let globalFontSize = 13;   // default font size applied to all cards
  let lastFocusedTextarea = null; // most recently focused pane (for toolbar actions)

  // ── Color palette ──
  // Each entry: { id, label, dark:{hdr,ta,taFocus,border,title,dot}, light:{...} }
  const PALETTE = [
    { id: 'none',    label: '✕', dot: '#444' },
    { id: 'red',     label: '', dot: '#c0392b',
      dark:  { hdr:'#1a0800', ta:'#110500', taFocus:'#1c0a00', border:'#4a1a0a', title:'#d06050', dot:'#c0392b' },
      light: { hdr:'#fdecea', ta:'#fff8f7', taFocus:'#fde8e5', border:'#e8a090', title:'#a03020', dot:'#c0392b' } },
    { id: 'orange',  label: '', dot: '#d35400',
      dark:  { hdr:'#1a0e00', ta:'#110900', taFocus:'#1c1000', border:'#4a2a00', title:'#c87830', dot:'#d35400' },
      light: { hdr:'#fef3e2', ta:'#fffaf3', taFocus:'#fdefd6', border:'#e8b870', title:'#904010', dot:'#d35400' } },
    { id: 'yellow',  label: '', dot: '#b8860b',
      dark:  { hdr:'#141200', ta:'#0e0c00', taFocus:'#181500', border:'#3a3000', title:'#b8a030', dot:'#b8860b' },
      light: { hdr:'#fdfbe6', ta:'#fffef5', taFocus:'#faf7d0', border:'#d4c050', title:'#706000', dot:'#b8860b' } },
    { id: 'green',   label: '', dot: '#1e8449',
      dark:  { hdr:'#001a08', ta:'#000f04', taFocus:'#001a0a', border:'#0a3a18', title:'#3a9a50', dot:'#1e8449' },
      light: { hdr:'#e8f8ee', ta:'#f5fdf8', taFocus:'#d8f0e2', border:'#80c898', title:'#0f6030', dot:'#1e8449' } },
    { id: 'teal',    label: '', dot: '#148f77',
      dark:  { hdr:'#001814', ta:'#000e0b', taFocus:'#001c17', border:'#0a3830', title:'#30988a', dot:'#148f77' },
      light: { hdr:'#e4f7f4', ta:'#f2fcfa', taFocus:'#d0f0ea', border:'#70c4b8', title:'#0a6058', dot:'#148f77' } },
    { id: 'blue',    label: '', dot: '#1a5276',
      dark:  { hdr:'#000e1a', ta:'#00080f', taFocus:'#001020', border:'#0a2a48', title:'#3878b0', dot:'#1a5276' },
      light: { hdr:'#e8f0fb', ta:'#f4f8fe', taFocus:'#d8e8f8', border:'#80a8d8', title:'#0f3a70', dot:'#1a5276' } },
    { id: 'purple',  label: '', dot: '#6c3483',
      dark:  { hdr:'#130a1a', ta:'#0c0510', taFocus:'#180e20', border:'#3a1a50', title:'#9060b8', dot:'#6c3483' },
      light: { hdr:'#f4eafb', ta:'#faf5fe', taFocus:'#ead8f8', border:'#b888d8', title:'#5a1a80', dot:'#6c3483' } },
    { id: 'pink',    label: '', dot: '#a93226',
      dark:  { hdr:'#1a0010', ta:'#0f0008', taFocus:'#1e0014', border:'#4a0830', title:'#c04880', dot:'#b03060' },
      light: { hdr:'#fdeef6', ta:'#fef7fb', taFocus:'#fcdeed', border:'#e898c0', title:'#8a1050', dot:'#b03060' } },
  ];

  // ── Build color popup ──
  const popup = document.getElementById('color-popup');
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'cp-swatch';
    sw.title = c.id === 'none' ? 'Remove color' : c.id;
    sw.style.background = c.dot;
    if (c.id === 'none') sw.textContent = '✕';
    sw.dataset.colorId = c.id;
    popup.appendChild(sw);
  });

  // ── Build color filter bar ──
  // Active filters: set of color ids ('none' = uncolored). Empty = show all.
  const activeFilters = new Set();
  const filterBar = document.getElementById('filter-swatches');
  PALETTE.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'filter-swatch';
    sw.title = c.id === 'none' ? 'Show uncolored' : 'Show ' + c.id;
    sw.dataset.filterId = c.id;
    if (c.id === 'none') {
      sw.textContent = '○';
    } else {
      sw.style.background = c.dot;
    }
    filterBar.appendChild(sw);
  });

  filterBar.addEventListener('click', e => {
    const sw = e.target.closest('.filter-swatch');
    if (!sw) return;
    const id = sw.dataset.filterId;
    if (activeFilters.has(id)) activeFilters.delete(id);
    else activeFilters.add(id);
    sw.classList.toggle('active', activeFilters.has(id));
    applyFilters();
  });

  function applyFilters() {
    sections.forEach((sec, i) => {
      if (activeFilters.size === 0) {
        sec.classList.remove('filtered-out');
        return;
      }
      const colorId = sectionColors[i] || 'none';
      sec.classList.toggle('filtered-out', !activeFilters.has(colorId));
    });
  }

  let popupTarget = -1; // section index popup is open for

  function openPopup(secIdx, dotEl) {
    popupTarget = secIdx;
    // Position near the dot
    const rect = dotEl.getBoundingClientRect();
    popup.style.top = (rect.bottom + 4) + 'px';
    popup.style.left = Math.min(rect.left, window.innerWidth - 120) + 'px';
    popup.classList.remove('hidden');
    // Mark selected
    popup.querySelectorAll('.cp-swatch').forEach(sw => {
      sw.classList.toggle('selected', sw.dataset.colorId === (sectionColors[secIdx] || 'none'));
    });
  }

  function closePopup() {
    popup.classList.add('hidden');
    popupTarget = -1;
  }

  popup.addEventListener('click', e => {
    const sw = e.target.closest('.cp-swatch');
    if (!sw || popupTarget < 0) return;
    const cid = sw.dataset.colorId;
    applyColor(popupTarget, cid === 'none' ? null : cid);
    applyFilters();
    closePopup();
    autoSave();
  });

  document.addEventListener('click', e => {
    if (!popup.classList.contains('hidden') && !popup.contains(e.target) && !e.target.closest('.color-dot')) {
      closePopup();
    }
  });

  function applyColor(idx, colorId) {
    sectionColors[idx] = colorId;
    const sec = sections[idx];
    if (!colorId) {
      sec.removeAttribute('data-color');
      sec.style.removeProperty('--sec-hdr-bg');
      sec.style.removeProperty('--sec-ta-bg');
      sec.style.removeProperty('--sec-ta-focus');
      sec.style.removeProperty('--sec-border');
      sec.style.removeProperty('--sec-title');
      sec.style.removeProperty('--sec-dot');
      dots[idx].style.background = '#333';
      return;
    }
    const entry = PALETTE.find(p => p.id === colorId);
    if (!entry) return;
    const t = themeBase() === 'light' ? entry.light : entry.dark;
    sec.setAttribute('data-color', colorId);
    sec.style.setProperty('--sec-hdr-bg', t.hdr);
    sec.style.setProperty('--sec-ta-bg', t.ta);
    sec.style.setProperty('--sec-ta-focus', t.taFocus);
    sec.style.setProperty('--sec-border', t.border);
    sec.style.setProperty('--sec-title', t.title);
    sec.style.setProperty('--sec-dot', t.dot);
    dots[idx].style.background = entry.dot;
  }

  function reapplyAllColors() {
    sectionColors.forEach((c, i) => applyColor(i, c));
  }

  function applyCardStrike(i, on) {
    sectionStruck[i] = !!on;
    if (sections[i]) sections[i].classList.toggle('struck', !!on);
  }
  function toggleCardStrike(i) {
    applyCardStrike(i, !sectionStruck[i]);
    autoSave();
  }

  // Flip a card between its front (board) and back (next-day task).
  function flipCard(i) {
    const sec = sections[i];
    if (!sec) return;
    sec.classList.add('flip-anim');
    setTimeout(() => sec.classList.remove('flip-anim'), 400);
    sec.classList.toggle('flipped');
    const onBack = sec.classList.contains('flipped');
    const target = onBack ? backTextareas[i] : textareas[i];
    if (target) target.focus();
  }

  // ── In-text highlighting ──
  // A single tokenizer pass colors several token types without nesting.
  const HL_RE = new RegExp([
    '\\bU[1-5]\\b',                                   // urgency U1..U5
    '\\bP[1-5]\\b',                                   // priority P1..P5
    '\\b(?:DONE|FIXED|RESOLVED|CLOSED)\\b',           // completed
    '\\b(?:TODO|FIXME|WIP|REVIEW|PENDING|LATER)\\b',  // in-progress / todo
    '\\b(?:BUG|BLOCKED|FAILED?|URGENT|ASAP|CRITICAL|IMPORTANT|RISK)\\b', // alert
    '@\\w+',                                          // @mentions
    '#\\w+',                                          // #tags
    '\\b\\d{4}-\\d{2}-\\d{2}\\b'                       // ISO dates
  ].join('|'), 'gi');

  function classOf(m) {
    if (/^[uU][1-5]$/.test(m)) return 'hl hl-u' + m[1];
    if (/^[pP][1-5]$/.test(m)) return 'hl hl-p' + m[1];
    if (m[0] === '@') return 'hl hl-mention';
    if (m[0] === '#') return 'hl hl-tag';
    if (/^\d{4}-\d{2}-\d{2}$/.test(m)) return 'hl hl-date';
    const up = m.toUpperCase();
    if (/^(DONE|FIXED|RESOLVED|CLOSED)$/.test(up)) return 'hl hl-done';
    if (/^(TODO|FIXME|WIP|REVIEW|PENDING|LATER)$/.test(up)) return 'hl hl-todo';
    return 'hl hl-alert';
  }
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function highlightHTML(text) {
    let h = escapeHtml(text).replace(HL_RE, m => '<span class="' + classOf(m) + '">' + m + '</span>');
    if (h.charCodeAt(h.length - 1) === 10) h += ' '; // mirror trailing newline
    return h;
  }
  function updateHighlight(ta) {
    if (ta && ta._bd) ta._bd.innerHTML = highlightHTML(ta.value);
  }
  function applyTaFontSize(ta, px) {
    ta.style.fontSize = px + 'px';
    if (ta._bd) ta._bd.style.fontSize = px + 'px';
  }

  // ── Build grid (infinite scroll) ──
  const grid = document.getElementById('grid');
  const textareas = [];
  const textareas2 = [];   // secondary pane (when split), per section
  const cellBodies = [];
  const titles = [];
  const wordCounts = [];
  const sections = [];
  const dots = [];
  const splitBtns = [];

  // Build one section at index i and append it to the grid.
  function createSection(i) {
    sectionColors[i] = null;
    sectionStruck[i] = false;
    sectionFontSizes[i] = globalFontSize;
    splitModes[i] = null;
    splitPos[i] = 50;
    textareas2[i] = null;

    const sec = document.createElement('div');
    sec.className = 'section';
    sections[i] = sec;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';

    // Drag handle to move this cell elsewhere
    const grip = document.createElement('span');
    grip.className = 'drag-handle';
    grip.textContent = '⠿';
    grip.title = 'Drag to move this cell';
    grip.draggable = true;
    grip.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      sec.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', String(i)); } catch (err) {}
    });
    grip.addEventListener('dragend', () => {
      sec.classList.remove('dragging');
      sections.forEach(s => s.classList.remove('drag-over'));
      dragSrcIdx = -1;
    });
    sec.addEventListener('dragover', e => {
      if (dragSrcIdx < 0) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    sec.addEventListener('dragenter', () => { if (dragSrcIdx >= 0 && dragSrcIdx !== i) sec.classList.add('drag-over'); });
    sec.addEventListener('dragleave', () => sec.classList.remove('drag-over'));
    sec.addEventListener('drop', e => {
      e.preventDefault();
      sec.classList.remove('drag-over');
      if (dragSrcIdx >= 0) moveSection(dragSrcIdx, i);
      dragSrcIdx = -1;
    });

    const titleInput = document.createElement('input');
    titleInput.className = 'section-title';
    titleInput.placeholder = `Section ${i + 1}`;
    titleInput.type = 'text';
    titleInput.spellcheck = false;
    titles[i] = titleInput;

    const wc = document.createElement('span');
    wc.className = 'word-count';
    wc.textContent = '0w';
    wordCounts[i] = wc;

    // Color dot
    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.title = 'Set section color';
    dot.style.background = '#333';
    dots[i] = dot;
    dot.addEventListener('click', e => {
      e.stopPropagation();
      if (popupTarget === i && !popup.classList.contains('hidden')) { closePopup(); return; }
      openPopup(i, dot);
    });

    // Card-level strikethrough toggle
    const strikeCardBtn = document.createElement('button');
    strikeCardBtn.className = 'strike-btn';
    strikeCardBtn.innerHTML = 'S&#822;';
    strikeCardBtn.title = 'Strike out this whole card';
    strikeCardBtn.addEventListener('click', e => { e.stopPropagation(); toggleCardStrike(i); });

    // Split control
    const splitBtn = document.createElement('button');
    splitBtn.className = 'split-btn';
    splitBtn.textContent = '⊞';
    splitBtn.title = 'Split this cell';
    splitBtns[i] = splitBtn;
    splitBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (splitTarget === i && !splitPopup.classList.contains('hidden')) { closeSplitPopup(); return; }
      openSplitPopup(i, splitBtn);
    });

    hdr.appendChild(grip);
    hdr.appendChild(titleInput);
    hdr.appendChild(wc);
    hdr.appendChild(strikeCardBtn);
    hdr.appendChild(splitBtn);
    hdr.appendChild(dot);

    const body = document.createElement('div');
    body.className = 'cell-body';
    cellBodies[i] = body;

    const ta = makeTextarea(i);
    textareas[i] = ta;
    body.appendChild(ta._wrap);

    // Flip container: front (board) + back (next-day task)
    const flip = document.createElement('div');
    flip.className = 'flip-inner';
    const back = document.createElement('div');
    back.className = 'card-back';
    const backLabel = document.createElement('div');
    backLabel.className = 'card-back-label';
    backLabel.innerHTML = '<span>Next-day task</span><span class="hint">Ctrl/⌘ + double-click to flip</span>';
    const taBack = document.createElement('textarea');
    taBack.className = 'textarea card-back-ta';
    taBack.placeholder = 'tomorrow…';
    taBack.spellcheck = false;
    taBack.style.fontSize = globalFontSize + 'px';
    taBack.addEventListener('input', autoSave);
    backTextareas[i] = taBack;
    back.appendChild(backLabel);
    back.appendChild(taBack);
    flip.appendChild(body);
    flip.appendChild(back);

    // Ctrl/Cmd + double-click flips the focused card.
    sec.addEventListener('dblclick', e => {
      if (e.ctrlKey || e.metaKey) { e.preventDefault(); flipCard(i); }
    });

    sec.appendChild(hdr);
    sec.appendChild(flip);
    grid.appendChild(sec);

    titleInput.addEventListener('input', autoSave);
  }

  // Ensure at least `n` sections exist (rounded up to whole rows of COLS).
  function ensureSections(n) {
    const target = Math.ceil(Math.max(n, 1) / COLS) * COLS;
    for (let i = sections.length; i < target; i++) createSection(i);
  }

  // Append more rows as the user scrolls near the bottom.
  grid.addEventListener('scroll', () => {
    if (grid.scrollTop + grid.clientHeight >= grid.scrollHeight - 80) {
      ensureSections(sections.length + GROW_ROWS * COLS);
      applyFilters();
    }
  });

  // Create a configured textarea wrapped in a highlight pane.
  // Returns the textarea; ta._wrap is the pane element, ta._bd the backdrop.
  function makeTextarea(i, secondary) {
    const wrap = document.createElement('div');
    wrap.className = 'pane';
    const backdrop = document.createElement('div');
    backdrop.className = 'hl-backdrop';
    backdrop.setAttribute('aria-hidden', 'true');
    const ta = document.createElement('textarea');
    ta.className = 'textarea';
    ta.placeholder = 'notes…';
    ta.spellcheck = false;
    ta._wrap = wrap;
    ta._bd = backdrop;
    wrap.appendChild(backdrop);
    wrap.appendChild(ta);
    applyTaFontSize(ta, sectionFontSizes[i]);
    ta.addEventListener('input', () => { updateHighlight(ta); updateWordCount(i); autoSave(); });
    ta.addEventListener('focus', () => { activeSectionIdx = i; lastFocusedTextarea = ta; updateFontSizeUI(); });
    ta.addEventListener('scroll', () => { backdrop.scrollTop = ta.scrollTop; backdrop.scrollLeft = ta.scrollLeft; });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, start) + '\t' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
        updateHighlight(ta);
        updateWordCount(i);
        autoSave();
      }
    });
    return ta;
  }

  // ── Cell splitting ──
  const splitPopup = document.getElementById('split-popup');
  let splitTarget = -1;

  function openSplitPopup(idx, btnEl) {
    splitTarget = idx;
    const rect = btnEl.getBoundingClientRect();
    splitPopup.classList.remove('hidden');
    splitPopup.style.top = (rect.bottom + 4) + 'px';
    splitPopup.style.left = Math.min(rect.left, window.innerWidth - 110) + 'px';
  }
  function closeSplitPopup() {
    splitPopup.classList.add('hidden');
    splitTarget = -1;
  }
  splitPopup.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn || splitTarget < 0) return;
    const mode = btn.dataset.split === 'none' ? null : btn.dataset.split;
    setSplit(splitTarget, mode);
    closeSplitPopup();
    autoSave();
  });
  document.addEventListener('click', e => {
    if (!splitPopup.classList.contains('hidden') && !splitPopup.contains(e.target) && !e.target.closest('.split-btn')) {
      closeSplitPopup();
    }
  });

  // Apply / change a section's split layout, preserving content
  function setSplit(i, mode) {
    splitModes[i] = mode;
    const body = cellBodies[i];
    const primary = textareas[i];
    body.innerHTML = '';                 // detaches children; element refs (and their values) survive
    primary._wrap.style.flex = '';
    body.classList.toggle('split', !!mode);
    body.style.flexDirection = mode === 'col' ? 'column' : 'row';
    body.appendChild(primary._wrap);
    splitBtns[i].textContent = mode ? '⊟' : '⊞';
    splitBtns[i].title = mode ? 'Change / merge split' : 'Split this cell';
    if (!mode) { updateWordCount(i); return; }
    if (!textareas2[i]) textareas2[i] = makeTextarea(i, true);
    const splitter = document.createElement('div');
    splitter.className = 'cell-splitter';
    attachSplitterDrag(splitter, i);
    body.appendChild(splitter);
    body.appendChild(textareas2[i]._wrap);
    const p = splitPos[i];
    primary._wrap.style.flex = '0 0 ' + p + '%';
    textareas2[i]._wrap.style.flex = '0 0 ' + (100 - p) + '%';
    updateWordCount(i);
    updateHighlight(textareas2[i]);
  }

  function attachSplitterDrag(splitter, i) {
    splitter.addEventListener('mousedown', e => {
      e.preventDefault();
      const body = cellBodies[i];
      const rect = body.getBoundingClientRect();
      const horizontal = splitModes[i] === 'row'; // panes left/right
      function onMove(ev) {
        let pct = horizontal
          ? (ev.clientX - rect.left) / rect.width * 100
          : (ev.clientY - rect.top) / rect.height * 100;
        pct = Math.max(12, Math.min(88, pct));
        splitPos[i] = pct;
        textareas[i]._wrap.style.flex = '0 0 ' + pct + '%';
        textareas2[i]._wrap.style.flex = '0 0 ' + (100 - pct) + '%';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.userSelect = '';
        autoSave();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.body.style.userSelect = 'none';
    });
  }

  function countWords(s) {
    const t = s.trim();
    return t ? t.split(/\s+/).length : 0;
  }
  function updateWordCount(i) {
    let n = countWords(textareas[i].value);
    if (splitModes[i] && textareas2[i]) n += countWords(textareas2[i].value);
    wordCounts[i].textContent = n + 'w';
  }

  // ── Persistence ──
  // Populate the grid from a saved state object.
  function applyState(data) {
    if (!data) return;
    try {
      if (data.theme) applyTheme(data.theme, false);
      if (typeof data.globalFontSize === 'number') globalFontSize = data.globalFontSize;
      const notes = data.notes || [];
      ensureSections(notes.length);   // create enough cells for the saved data
      notes.forEach((n, i) => {
        textareas[i].value = n.text || '';
        titles[i].value = n.title || '';
        if (backTextareas[i]) backTextareas[i].value = n.back || '';
        if (n.color !== undefined) sectionColors[i] = n.color;
        applyCardStrike(i, !!n.struck);
        if (n.fontSize) { sectionFontSizes[i] = n.fontSize; applyTaFontSize(textareas[i], n.fontSize); }
        if (n.split) {
          splitPos[i] = (typeof n.splitPos === 'number') ? n.splitPos : 50;
          setSplit(i, n.split);
          if (textareas2[i]) {
            textareas2[i].value = n.text2 || '';
            applyTaFontSize(textareas2[i], sectionFontSizes[i]);
            updateHighlight(textareas2[i]);
          }
        }
        updateHighlight(textareas[i]);
        updateWordCount(i);
      });
      if (typeof data.cardHeight === 'number' || data.cardHeight === null) {
        cardHeight = data.cardHeight;
      }
      applyCardHeight();
      if (data.fontFamily) applyFontFamily(data.fontFamily, false);
      reapplyAllColors();
      updateFontSizeUI();
      if (typeof updateGlobalFontUI === 'function') updateGlobalFontUI();
    } catch (e) {}
  }

  // Offline / exported-snapshot loader (used only when a seed is present).
  function loadSeedState() {
    let raw = null;
    if (window.__NOTES_SEED__) raw = window.__NOTES_SEED__;
    if (!raw) { try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) {} }
    if (!raw) return;
    try { applyState(JSON.parse(raw)); } catch (e) {}
  }

  function isEmptySection(i) {
    return !textareas[i].value &&
           !titles[i].value &&
           !sectionColors[i] &&
           !sectionStruck[i] &&
           !splitModes[i] &&
           sectionFontSizes[i] === globalFontSize &&
           !(textareas2[i] && textareas2[i].value) &&
           !(backTextareas[i] && backTextareas[i].value);
  }
  function currentState() {
    // Trim trailing empty sections so the infinite grid doesn't bloat storage.
    let last = sections.length - 1;
    while (last >= 0 && isEmptySection(last)) last--;
    const notes = [];
    for (let i = 0; i <= last; i++) {
      notes.push({
        text: textareas[i].value,
        title: titles[i].value,
        color: sectionColors[i] || null,
        struck: !!sectionStruck[i],
        fontSize: sectionFontSizes[i],
        split: splitModes[i] || null,
        splitPos: splitPos[i],
        text2: textareas2[i] ? textareas2[i].value : '',
        back: backTextareas[i] ? backTextareas[i].value : ''
      });
    }
    return { notes, theme, cardHeight, fontFamily, globalFontSize };
  }
  // Save: PocketBase when online & authed; localStorage only for offline
  // exported snapshots (seed mode).
  let saveTimer = null;
  function autoSave() {
    if (OFFLINE) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState())); } catch (e) {}
      flashStatus('Saved ✓');
      return;
    }
    if (!authToken) return; // not signed in yet
    clearTimeout(saveTimer);
    flashStatus('Saving…', true);
    saveTimer = setTimeout(() => { saveToPB(); }, 700);
  }

  // ── Move / reorder a cell (drag-and-drop) ──
  function getNote(i) {
    return {
      text: textareas[i].value,
      title: titles[i].value,
      color: sectionColors[i] || null,
      struck: !!sectionStruck[i],
      fontSize: sectionFontSizes[i],
      split: splitModes[i] || null,
      splitPos: splitPos[i],
      text2: textareas2[i] ? textareas2[i].value : '',
      back: backTextareas[i] ? backTextareas[i].value : ''
    };
  }
  function applyNote(i, n) {
    textareas[i].value = n.text || '';
    titles[i].value = n.title || '';
    sectionFontSizes[i] = n.fontSize || 13;
    applyTaFontSize(textareas[i], sectionFontSizes[i]);
    splitPos[i] = (typeof n.splitPos === 'number') ? n.splitPos : 50;
    setSplit(i, n.split || null);
    if (n.split && textareas2[i]) {
      textareas2[i].value = n.text2 || '';
      applyTaFontSize(textareas2[i], sectionFontSizes[i]);
      updateHighlight(textareas2[i]);
    }
    applyColor(i, n.color || null);
    applyCardStrike(i, !!n.struck);
    if (backTextareas[i]) backTextareas[i].value = n.back || '';
    updateHighlight(textareas[i]);
    updateWordCount(i);
  }
  // Move content from index `from` to index `to`, shifting the cells between.
  function moveSection(from, to) {
    if (from === to || from < 0 || to < 0) return;
    const notes = sections.map((_, i) => getNote(i));
    const [moved] = notes.splice(from, 1);
    notes.splice(to, 0, moved);
    notes.forEach((n, i) => applyNote(i, n));
    applyFilters();
    autoSave();
  }

  let statusTimer;
  function flashStatus(msg, sticky) {
    const el = document.getElementById('status');
    if (msg) el.textContent = msg;
    el.classList.add('show');
    clearTimeout(statusTimer);
    if (!sticky) statusTimer = setTimeout(() => el.classList.remove('show'), 1400);
  }

  // ── Per-section font size ──
  function updateFontSizeUI() {
    const display = document.getElementById('font-size-display');
    const btnUp   = document.getElementById('font-up');
    const btnDown = document.getElementById('font-down');
    if (activeSectionIdx < 0) {
      display.textContent = '—';
      btnUp.disabled = true;
      btnDown.disabled = true;
    } else {
      const sz = sectionFontSizes[activeSectionIdx];
      display.textContent = sz;
      btnUp.disabled   = sz >= 24;
      btnDown.disabled = sz <= 9;
    }
  }

  function setSectionFontSize(idx, size, save = true) {
    if (idx < 0 || idx >= sections.length) return;
    sectionFontSizes[idx] = Math.max(9, Math.min(24, size));
    applyTaFontSize(textareas[idx], sectionFontSizes[idx]);
    if (textareas2[idx]) applyTaFontSize(textareas2[idx], sectionFontSizes[idx]);
    if (idx === activeSectionIdx) updateFontSizeUI();
    if (save) autoSave();
  }

  document.getElementById('font-up').addEventListener('click', () => {
    if (activeSectionIdx < 0) return;
    setSectionFontSize(activeSectionIdx, sectionFontSizes[activeSectionIdx] + 1);
    textareas[activeSectionIdx].focus();
  });
  document.getElementById('font-down').addEventListener('click', () => {
    if (activeSectionIdx < 0) return;
    setSectionFontSize(activeSectionIdx, sectionFontSizes[activeSectionIdx] - 1);
    textareas[activeSectionIdx].focus();
  });

  // Init buttons as disabled until a section is focused
  updateFontSizeUI();

  // ── Global font size (all cards at once) ──
  function updateGlobalFontUI() {
    document.getElementById('gfont-size-display').textContent = globalFontSize;
    document.getElementById('gfont-up').disabled = globalFontSize >= 24;
    document.getElementById('gfont-down').disabled = globalFontSize <= 9;
  }
  function setGlobalFontSize(size, save = true) {
    globalFontSize = Math.max(9, Math.min(24, size));
    for (let i = 0; i < sections.length; i++) {
      sectionFontSizes[i] = globalFontSize;
      applyTaFontSize(textareas[i], globalFontSize);
      if (textareas2[i]) applyTaFontSize(textareas2[i], globalFontSize);
      if (backTextareas[i]) backTextareas[i].style.fontSize = globalFontSize + 'px';
    }
    updateGlobalFontUI();
    updateFontSizeUI();
    if (save) autoSave();
  }
  document.getElementById('gfont-up').addEventListener('click', () => setGlobalFontSize(globalFontSize + 1));
  document.getElementById('gfont-down').addEventListener('click', () => setGlobalFontSize(globalFontSize - 1));
  updateGlobalFontUI();

  // ── Strikethrough selected text (combining U+0336, works in plain textareas) ──
  var STRIKE = String.fromCharCode(0x0336);
  function toggleStrike(str) {
    if (str.indexOf(STRIKE) !== -1) return str.split(STRIKE).join('');   // un-strike
    return Array.from(str).map(ch => ch + STRIKE).join('');              // strike
  }
  const strikeBtn = document.getElementById('strike-btn');
  // Keep the textarea focused/selected when the button is pressed.
  strikeBtn.addEventListener('mousedown', e => e.preventDefault());
  strikeBtn.addEventListener('click', () => {
    let ta = document.activeElement;
    if (!ta || ta.tagName !== 'TEXTAREA' || !ta.classList.contains('textarea')) ta = lastFocusedTextarea;
    if (!ta) { flashStatus('Click into a card first'); return; }
    const start = ta.selectionStart, end = ta.selectionEnd;
    if (start == null || start === end) { flashStatus('Select text to strike'); return; }
    const before = ta.value.slice(0, start);
    const sel = ta.value.slice(start, end);
    const after = ta.value.slice(end);
    const replaced = toggleStrike(sel);
    ta.value = before + replaced + after;
    ta.focus();
    ta.setSelectionRange(start, start + replaced.length);
    updateHighlight(ta);
    const idx = textareas.indexOf(ta);
    const idx2 = idx === -1 ? textareas2.indexOf(ta) : idx;
    if (idx2 !== -1) updateWordCount(idx2);
    autoSave();
  });

  // ── Uniform card height (all cards at once) ──
  let cardHeight = null; // null = Fit (auto rows to viewport)
  const CARD_H_MIN = 120, CARD_H_MAX = 600, CARD_H_STEP = 40;

  function updateCardHeightUI() {
    document.getElementById('card-h-display').textContent =
      cardHeight === null ? 'Auto' : cardHeight + 'px';
    document.getElementById('card-h-up').disabled   = cardHeight !== null && cardHeight >= CARD_H_MAX;
    document.getElementById('card-h-down').disabled  = cardHeight !== null && cardHeight <= CARD_H_MIN;
  }

  function applyCardHeight() {
    // Default ("Fit"): four rows fill the visible grid; otherwise a fixed height.
    const h = cardHeight === null
      ? Math.max(CARD_H_MIN, Math.floor((grid.clientHeight || window.innerHeight) / 4))
      : cardHeight;
    grid.style.setProperty('--card-h', h + 'px');
    updateCardHeightUI();
  }
  // Keep the auto ("Fit") row height in sync with the viewport.
  window.addEventListener('resize', () => { if (cardHeight === null) applyCardHeight(); });

  function setCardHeight(h, save = true) {
    if (h === null) cardHeight = null;
    else cardHeight = Math.max(CARD_H_MIN, Math.min(CARD_H_MAX, h));
    applyCardHeight();
    if (save) autoSave();
  }

  document.getElementById('card-h-up').addEventListener('click', () => {
    setCardHeight(cardHeight === null ? 240 : cardHeight + CARD_H_STEP);

  document.getElementById('card-h-down').addEventListener('click', () => {
    setCardHeight(cardHeight === null ? 200 : cardHeight - CARD_H_STEP);

  document.getElementById('card-h-auto').addEventListener('click', () => {
    setCardHeight(null);
  });
  updateCardHeightUI();

  // ── Font family (applies to all note text) ──
  const FONTS = [
    { id: 'mono',     label: 'Courier (mono)', stack: "'Courier New', Courier, monospace" },
    { id: 'menlo',    label: 'Menlo / Consolas', stack: "ui-monospace, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" },
    { id: 'system',   label: 'System Sans', stack: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" },
    { id: 'serif',    label: 'Serif', stack: "Georgia, 'Times New Roman', Times, serif" },
    { id: 'georgia',  label: 'Georgia', stack: "Georgia, serif" },
    { id: 'verdana',  label: 'Verdana', stack: "Verdana, Geneva, sans-serif" },
    { id: 'trebuchet',label: 'Trebuchet', stack: "'Trebuchet MS', 'Segoe UI', sans-serif" },

  // ── Theme ──
  // Each theme maps to a palette base ('dark' or 'light') for section tinting.
  const THEMES = [
    { id: 'dark',     label: 'Dark',     base: 'dark'  },
    { id: 'light',    label: 'Light',    base: 'light' },
    { id: 'midnight', label: 'Midnight', base: 'dark'  },
    { id: 'dracula',  label: 'Dracula',  base: 'dark'  },
    { id: 'carbon',   label: 'Carbon',   base: 'dark'  },
    { id: 'nord',     label: 'Nord',     base: 'dark'  },
    { id: 'matrix',   label: 'Matrix',   base: 'dark'  },
    { id: 'crimson',  label: 'Crimson',  base: 'dark'  },
    { id: 'ocean',    label: 'Ocean',    base: 'dark'  },
    { id: 'amber',    label: 'Amber',    base: 'light' },
    { id: 'slate',    label: 'Slate',    base: 'light' },
  ];
  function themeBase() {
    const t = THEMES.find(x => x.id === theme);
    return t ? t.base : 'dark';
  }
  function applyTheme(t, save = true) {
    if (!THEMES.some(x => x.id === t)) t = 'dark';
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem('notes_theme', t); } catch (e) {} // cache to avoid flicker next load
    const meta = THEMES.find(x => x.id === t);
    document.getElementById('theme-btn').textContent = '◑ ' + meta.label;
    reapplyAllColors();
    if (save) autoSave();
  }
  function cycleTheme() {
    const idx = THEMES.findIndex(x => x.id === theme);
    applyTheme(THEMES[(idx + 1) % THEMES.length].id);
